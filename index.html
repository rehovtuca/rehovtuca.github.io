*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1A3A8F;--blue2:#1e3fa5;--gold:#C8960C;--gold2:#d4a017;
  --orange:#E65100;--green:#1B5E20;--green2:#2e7d32;
  --purple:#4A148C;--dark:#0f1b3d;--bg:#f0f2f8;--white:#fff;
  --text:#0f1b3d;--muted:#6b7280;--border:#dde3f0;--radius:14px;
  --shadow:0 2px 16px rgba(26,58,143,.10);
  --hdr:#1A3A8F;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
#root{min-height:100vh}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#c0c8e0;border-radius:3px}
input,select,textarea,button{font-family:inherit}
button{cursor:pointer}
a{text-decoration:none;color:inherit}
.hide-scroll{-ms-overflow-style:none;scrollbar-width:none}
.hide-scroll::-webkit-scrollbar{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-up{animation:fadeUp .35s ease both}

const FB_URL=`https://firestore.googleapis.com/v1/projects/${FB_CONFIG.projectId}/databases/(default)/documents/kv`;

const DB={
  _lsGet(k){try{const v=localStorage.getItem('rv_'+k);return v?JSON.parse(v):null;}catch{return null;}},
  _lsSet(k,v){try{localStorage.setItem('rv_'+k,JSON.stringify(v));}catch{}},
  _lsDel(k){try{localStorage.removeItem('rv_'+k);}catch{}},

  _fromFS(fields){
    if(!fields)return null;
    const v=fields.value;
    if(!v)return null;
    const raw=v.stringValue||null;
    if(!raw)return null;
    try{return JSON.parse(raw);}catch{return null;}
  },
  _toFS(val){
    return {fields:{value:{stringValue:JSON.stringify(val)}}};
  },

  async get(k){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),5000);
      const r=await fetch(`${FB_URL}/${encodeURIComponent(k)}`,{
        headers:{'Content-Type':'application/json'},
        cache:'no-store',signal:ctrl.signal
      });
      clearTimeout(tid);
      if(r.status===404)return this._lsGet(k);
      if(!r.ok)throw 0;
      const d=await r.json();
      const val=this._fromFS(d.fields);
      if(val!==null){this._lsSet(k,val);return val;}
    }catch{}
    return this._lsGet(k);
  },

  async set(k,val){
    // Always save to localStorage first
    this._lsSet(k,val);
    // Try Firebase up to 3 times
    for(let i=0;i<3;i++){
      try{
        const r=await fetch(`${FB_URL}/${encodeURIComponent(k)}?updateMask.fieldPaths=value`,{
          method:'PATCH',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(this._toFS(val))
        });
        if(r.ok)return true; // success
        if(r.status===404){
          // Document doesn't exist yet — create it
          const r2=await fetch(FB_URL,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({...this._toFS(val),name:`${FB_URL}/${k}`})
          });
          if(r2.ok)return true;
        }
      }catch{}
      await new Promise(res=>setTimeout(res,500*(i+1)));
    }
    return false;
  }
};

const fmt=n=>'₦'+(n||0).toLocaleString('en-NG');
const fmtDate=s=>{if(!s)return'';try{return new Date(s).toLocaleDateString('en-NG',{day:'2-digit',month:'short',year:'numeric'});}catch{return s;}};
const fmtTime=s=>{if(!s)return'';try{return new Date(s).toLocaleTimeString('en-NG',{hour:'2-digit',minute:'2-digit'});}catch{return s;}};
function genCode(role,users){
  const pfx=PREFIXES[role]||'XX';
  let max=0;
  Object.values(users||{}).forEach(u=>{if(u.role===role&&u.code){const n=parseInt((u.code||'').replace(pfx,''));if(!isNaN(n)&&n>max)max=n;}});
  return pfx+String(max+1).padStart(3,'0');
}
function calcNet(signups,deductions,bonuses){
  const s=signups||0;
  const gross=(Math.min(s,50)*500)+(Math.max(0,s-50)*700);
  const totalDed=(deductions||[]).reduce((a,d)=>a+(d.amount||0),0);
  const totalBon=(bonuses||[]).reduce((a,b)=>a+(b.amount||0),0);
  return{gross,totalDed,totalBon,net:gross-totalDed+totalBon};
}
function getMonthRange(){
  const now=new Date();
  const start=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];
  const end=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0];
  return{start,end,endDate:new Date(now.getFullYear(),now.getMonth()+1,0)};
}
function monthEndsIn(){
  const now=new Date();
  const endOfMonth=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59);
  const diff=endOfMonth-now;
  if(diff<=0)return'Month ended';
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  return`${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function LoginScreen({users,onLogin,onNavigate}){

    const u=Object.values(users).find(u=>
      (u.email||'').toLowerCase()===emailLower||

// ── FORGOT PASSWORD ────────────────────────────────────────────────────────
function ForgotPassword({users,saveUsers,onNavigate}){
  const [step,setStep]=useState(1);
  const [email,setEmail]=useState('');
  const [ans,setAns]=useState('');
  const [pw,setPw]=useState('');const [pw2,setPw2]=useState('');
  const [err,setErr]=useState('');const [found,setFound]=useState(null);
  const s1=()=>{
    const u=Object.values(users).find(u=>(u.email||'').toLowerCase()===email.trim().toLowerCase());
    if(!u){setErr('Email not found. Check your spelling.');return;}
    setFound(u);setStep(2);setErr('');
  };
  const s2=()=>{if(ans.toLowerCase().trim()!==found.securityA.toLowerCase().trim()){setErr('Wrong answer');return;}setStep(3);setErr('');};
  const s3=async()=>{
    
    if(pw!==pw2){setErr('Passwords do not match');return;}

    await saveUsers({...users,[k]:{...found,password:pw}});

        {step===1&&<><Inp label="Email Address" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com"/><Btn full onClick={s1}>Continue</Btn></>}
        {step===2&&<><div style={{marginBottom:14,fontSize:14,background:'#f0f4ff',padding:'10px 12px',borderRadius:10,color:'var(--blue)'}}><b>Security Question:</b> {found?.securityQ}</div><Inp label="Your Answer" value={ans} onChange={e=>setAns(e.target.value)}/><Btn full onClick={s2}>Verify</Btn></>}
        {step===3&&<><PwInp label="New Password" value={pw} onChange={e=>setPw(e.target.value)}/><PwInp label="Confirm Password" value={pw2} onChange={e=>setPw2(e.target.value)}/><Btn full onClick={s3}>Change Password</Btn></>}
        {step===4&&<><Alrt type="success" msg="Password changed successfully!"/><Btn full onClick={()=>onNavigate('login')}>Go to Login</Btn></>}

      </div>
    </div>
  );
}

    accName:'',accNum:'',bank:'',
    secQ:"What is your mother's maiden name?",secA:'',
    role:autoRole||'ambassador',ref:refCode
  });
  useEffect(()=>{
    if(!refCode||!Object.keys(users).length)return;
    const ru=Object.values(users).find(u=>u.code===refCode);
    if(ru)setForm(f=>({...f,role:DOWNLINE[ru.role]||'ambassador',ref:refCode}));

    if(Object.values(users).find(u=>(u.email||'').toLowerCase()===emailLower&&!u.resigned)){
      setErr('Email already registered. Please login instead.');return;
    }
    // Auto-generate code immediately — no waiting for approval

      id:nc,code:nc,

      ref:sessionStorage.getItem('ref_code')||form.ref||'',

    // Send welcome email
    const{subject,html}=EMAILS.welcome(form.name,nc,ROLE_LABELS[form.role],form.password);

// ── HOME TAB ───────────────────────────────────────────────────────────────
function HomeTab({user,users,signups,reports,settings}){
  const {start}=getMonthRange();
  const s=settings||DEFAULT_SETTINGS;

  // ── Count confirmed sign-ups only (founderApproved not false)
  const confirmedThisMonth=signups.filter(su=>su.date>=start&&su.founderApproved!==false);

  // ── AMBASSADOR ──
  const mySignups=confirmedThisMonth.filter(su=>su.ref===user.code);
  const myReports=reports.filter(r=>r.userCode===user.code&&r.date>=start);

  // ── CC: direct ambassadors under me, their confirmed sign-ups ──
  const myAmbassadors=Object.values(users).filter(u=>u.referredBy===user.code&&u.role==='ambassador'&&u.approved&&!u.resigned);
  const ccSignups=confirmedThisMonth.filter(su=>myAmbassadors.map(a=>a.code).includes(su.ref));

  // ── PM: CCs under me, and all ambassadors under those CCs ──
  const myCCs=Object.values(users).filter(u=>u.referredBy===user.code&&u.role==='cc'&&u.approved&&!u.resigned);
  const ccCodes=myCCs.map(c=>c.code);
  const ambsUnderPM=Object.values(users).filter(u=>ccCodes.includes(u.referredBy)&&u.role==='ambassador'&&u.approved&&!u.resigned);
  const pmSignups=confirmedThisMonth.filter(su=>ambsUnderPM.map(a=>a.code).includes(su.ref));

  // ── PFC: PMs under me → their CCs → their Ambassadors ──
  const myPMs=Object.values(users).filter(u=>u.referredBy===user.code&&u.role==='pm'&&u.approved&&!u.resigned);
  const pmCodes=myPMs.map(p=>p.code);
  const ccsUnderPFC=Object.values(users).filter(u=>pmCodes.includes(u.referredBy)&&u.role==='cc'&&u.approved&&!u.resigned);
  const ccCodesUnderPFC=ccsUnderPFC.map(c=>c.code);
  const ambsUnderPFC=Object.values(users).filter(u=>ccCodesUnderPFC.includes(u.referredBy)&&u.role==='ambassador'&&u.approved&&!u.resigned);
  const pfcSignups=confirmedThisMonth.filter(su=>ambsUnderPFC.map(a=>a.code).includes(su.ref));

  const needConfirm=user.role==='pfc'?signups.filter(su=>su.pfcStatus==='Pending').length:0;

  // Deductions & bonuses

    const n=mySignups.length;

    ambassador:['Follow up with every student within 24 hours','Share your link on WhatsApp and Instagram daily','Track your sign-ups every morning','Always collect referral payments immediately'],

function DeadlineCard({role}){
  const [rem,setRem]=useState('');const [past,setPast]=useState(false);
  useEffect(()=>{
    const dl=DEADLINES[role];if(!dl)return;
    const tick=()=>{
      const now=new Date();const[h,m]=dl.split(':').map(Number);
      const t=new Date(now);t.setHours(h,m,0,0);
      const diff=t-now;
      if(diff<=0){setPast(true);setRem('Deadline passed');}
      else{setPast(false);const hh=Math.floor(diff/3600000);const mm=Math.floor((diff%3600000)/60000);const ss=Math.floor((diff%60000)/1000);setRem(`${hh}h ${mm}m ${ss}s`);}
    };tick();const i=setInterval(tick,1000);return()=>clearInterval(i);
  },[role]);
  if(!role||role==='founder')return null;
  const ded=DEDUCTIONS[role]?.daily||0;
  return(
    <div style={{background:past?'#fee2e2':'#f0f4ff',borderRadius:14,padding:'12px 16px',border:`1.5px solid ${past?'#fca5a5':'#c0ccf0'}`}}>
      <div style={{fontSize:11,color:past?'#dc2626':'var(--blue)',fontWeight:600,marginBottom:4}}>📅 TODAY'S REPORT DEADLINE</div>
      <div style={{fontWeight:800,fontSize:20,color:past?'#dc2626':'var(--blue)'}}>{rem}</div>
      <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Deadline: {DEADLINES[role]} · Miss = -{fmt(ded)}</div>
    </div>
  );
}

  return(

      <div style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>Select a team member to message</div>
      {team.map(u=>{
        const un=unread(u.code);

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <b style={{fontSize:15}}>Notifications</b>
        {notifs.some(n=>!n.read)&&<Btn small onClick={markAll} variant="ghost">Mark all read</Btn>}
      </div>
      {bcs.map(b=>(
        <div key={b.id} style={{background:'#eff6ff',borderRadius:12,padding:'12px 14px',marginBottom:8,border:'1px solid #bfdbfe'}}>
          <div style={{fontSize:11,color:'var(--blue)',fontWeight:700,marginBottom:4}}>📢 Broadcast{b.role&&b.role!=='all'?` to ${ROLE_LABELS[b.role]}`:' to All'}</div>
          <div style={{fontSize:13}}>{b.message}</div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{fmtDate(b.time)}</div>
        </div>
      ))}
      {notifs.map((n,i)=>(
        <div key={i} style={{background:n.read?'var(--bg)':'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,border:`1px solid ${n.read?'transparent':'var(--border)'}`}}>
          <div style={{fontSize:13}}>{n.msg}</div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{fmtDate(n.time)}</div>
        </div>
      ))}
      {bcs.length===0&&notifs.length===0&&<div style={{textAlign:'center',color:'var(--muted)',marginTop:40}}>No notifications yet.</div>}
    </div>
  );
}

// ── REPORT HELPERS ─────────────────────────────────────────────────────────
function getMonthKey(dateStr){
  const d=new Date(dateStr);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function getMonthLabel(key){
  const [y,m]=key.split('-');
  return new Date(y,parseInt(m)-1,1).toLocaleDateString('en-NG',{month:'long',year:'numeric'});
}
function getDaysInMonth(year,month){
  return new Date(year,month,0).getDate();
}
function getMissedDays(reports,userCode,year,month){
  const daysInMonth=getDaysInMonth(year,month);
  const today=new Date();
  const isCurrentMonth=today.getFullYear()===year&&today.getMonth()+1===month;
  const lastDay=isCurrentMonth?today.getDate():daysInMonth;
  const submitted=new Set(
    reports.filter(r=>r.userCode===userCode&&r.type==='daily'&&
      new Date(r.date).getFullYear()===year&&new Date(r.date).getMonth()+1===month
    ).map(r=>new Date(r.date).getDate())
  );
  const missed=[];
  for(let d=1;d<=lastDay;d++){
    const date=new Date(year,month-1,d);
    if(date.getDay()!==0&&!submitted.has(d))missed.push(d); // skip Sundays
  }
  return missed;
}
function getUplineRole(role){
  const map={ambassador:'cc',cc:'pm',pm:'pfc',pfc:'founder'};
  return map[role];
}

// ── REPORTS TAB (member view — submit + my filed reports) ──────────────────
function ReportsTab({user,users,reports,saveReports,pushNotif}){
  const [activities,setActivities]=useState('');
  const [transactions,setTransactions]=useState('');
  const [contacts,setContacts]=useState('');
  const [challenges,setChallenges]=useState('');
  const [plan,setPlan]=useState('');
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [saving,setSaving]=useState(false);
  const [openMonth,setOpenMonth]=useState(null);
  const [replyTarget,setReplyTarget]=useState(null);
  const [replyText,setReplyText]=useState('');

  const mine=reports.filter(r=>r.userCode===user.code);
  const todayReport=mine.find(r=>r.date===TODAY&&r.type==='daily');

  const byMonth={};
  mine.forEach(r=>{
    const k=getMonthKey(r.date);
    if(!byMonth[k])byMonth[k]=[];
    byMonth[k].push(r);
  });
  const months=Object.keys(byMonth).sort((a,b)=>b>a?1:-1);

  const submit=async()=>{
    if(!activities.trim()){setErr('Please fill in your activities');return;}
    if(!transactions.trim()){setErr('Please fill in your transactions');return;}
    if(!contacts.trim()){setErr('Please fill in who you contacted');return;}
    if(!plan.trim()){setErr('Please fill in your plan for tomorrow');return;}
    if(todayReport){setErr('✅ You already submitted your report today. Come back tomorrow!');return;}
    setSaving(true);
    const reportText=`ACTIVITIES: ${activities}\nTRANSACTIONS: ${transactions}\nCONTACTS: ${contacts}\nCHALLENGES: ${challenges||'None'}\nPLAN: ${plan}`;
    const r={
      id:'rpt_'+Date.now(),
      userCode:user.code,userName:user.name,userRole:user.role,
      type:'daily',
      activities:activities.trim(),transactions:transactions.trim(),
      contacts:contacts.trim(),challenges:challenges.trim(),plan:plan.trim(),
      text:reportText,
      date:TODAY,time:new Date().toISOString(),replies:[]
    };
    await saveReports([...reports,r]);

    // Notify + email full upline chain
    const notifyChain=async(memberCode,depth=0)=>{
      if(!memberCode||depth>5)return;
      const m=users[memberCode];
      if(!m)return;
      await pushNotif(memberCode,`📋 Daily report from ${user.name} (${user.code})`);
      if(m.email){
        const{subject,html}=EMAILS.dailyReport(
          m.name,user.name,user.role,user.code,TODAY,
          activities.trim(),transactions.trim(),contacts.trim(),challenges.trim()||'None',plan.trim()
        );
        await sendEmail(m.email,m.name,subject,html);
      }
      const upCode=m.ref||m.referredBy||'';
      if(upCode&&upCode!==memberCode)await notifyChain(upCode,depth+1);
    };

    // Start chain from direct upline
    const myUplineCode=user.ref||user.referredBy||'';
    if(myUplineCode)await notifyChain(myUplineCode);
    else{
      // No upline — notify founder directly
      const founder=Object.values(users).find(u=>u.role==='founder');
      if(founder){
        await pushNotif('FOUNDER',`📋 Daily report from ${user.name} (${user.code})`);
        if(founder.email){
          const{subject,html}=EMAILS.dailyReport(founder.name,user.name,user.role,user.code,TODAY,activities.trim(),transactions.trim(),contacts.trim(),challenges.trim()||'None',plan.trim());
          await sendEmail(founder.email,founder.name,subject,html);
        }
      }
    }

    setActivities('');setTransactions('');setContacts('');setChallenges('');setPlan('');
    setOk('✅ Report submitted! Your upline has been notified.');setErr('');
    setSaving(false);
    setTimeout(()=>setOk(''),5000);
  };

  const submitReply=async(reportId)=>{
    if(!replyText.trim())return;
    const newReports=reports.map(r=>{
      if(r.id!==reportId)return r;
      const rep={by:user.name,byCode:user.code,text:replyText.trim(),time:new Date().toISOString()};
      return{...r,replies:[...(r.replies||[]),rep]};
    });
    await saveReports(newReports);
    // Notify report owner
    const rpt=reports.find(r=>r.id===reportId);
    if(rpt)await pushNotif(rpt.userCode,`💬 ${user.name} replied to your report`);
    setReplyText('');setReplyTarget(null);
  };

  const typeColor={daily:'#dbeafe',weekly:'#f3e5f5',monthly:'#e8f5e9'};
  const typeText={daily:'var(--blue)',weekly:'var(--purple)',monthly:'var(--green)'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:12,paddingBottom:16}}>
      {/* Submit form */}
      <div style={{background:'#fff',borderRadius:14,padding:16,boxShadow:'var(--shadow)'}}>
        <div style={{fontWeight:800,fontSize:15,color:'var(--blue)',marginBottom:2}}>📋 Daily Report</div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>Deadline: {DEADLINES[user.role]||'9:00 PM'} — submits to your full upline chain</div>
        {todayReport?(
          <div style={{background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:12,padding:14,textAlign:'center'}}>
            <div style={{fontSize:22,marginBottom:4}}>✅</div>
            <div style={{fontWeight:700,color:'#166534',fontSize:14}}>Report submitted today!</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>Your upline has been notified. See your report below.</div>
          </div>
        ):(
          <>
            {err&&<Alrt type="error" msg={err} onClose={()=>setErr('')}/>}
            {ok&&<Alrt type="success" msg={ok}/>}
            {[
              {label:'✅ What did you do today?',key:'activities',val:activities,set:setActivities,placeholder:'e.g. Called 10 prospects, shared link in 3 groups, followed up with 5 people...',required:true,color:'var(--blue)'},
              {label:'💰 Transactions & Signups',key:'transactions',val:transactions,set:setTransactions,placeholder:'e.g. 3 new signups, ₦6,000 collected, 0 transactions today...',required:true,color:'#1b5e20'},
              {label:'👥 People Contacted',key:'contacts',val:contacts,set:setContacts,placeholder:'e.g. Reached out to 8 students at UNILAG, 3 WhatsApp broadcasts...',required:true,color:'#e65100'},
              {label:'⚠️ Challenges (optional)',key:'challenges',val:challenges,set:setChallenges,placeholder:'Any blockers or issues? Leave blank if none...',required:false,color:'#c62828'},
              {label:'📅 Plan for Tomorrow',key:'plan',val:plan,set:setPlan,placeholder:'e.g. Visit campus, follow up with 5 pending members, post in 2 groups...',required:true,color:'#4A148C'},
            ].map(({label,val,set,placeholder,required,color})=>(
              <div key={label} style={{marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:700,color,marginBottom:4}}>{label}{required&&<span style={{color:'#c62828'}}> *</span>}</div>
                <textarea value={val} onChange={e=>set(e.target.value)} rows={2} placeholder={placeholder}
                  style={{width:'100%',padding:'9px 12px',border:'1.5px solid var(--border)',borderRadius:10,
                    fontSize:13,fontFamily:'inherit',resize:'vertical',boxSizing:'border-box',outline:'none'}}/>
              </div>
            ))}
            <Btn full onClick={submit} disabled={saving}>{saving?'Submitting...':'Submit Daily Report'}</Btn>
          </>
        )}
      </div>

      {/* Filed reports — by month */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
        <div style={{fontWeight:700,fontSize:14}}>My Reports ({mine.length} total)</div>
        {mine.length>0&&<button onClick={()=>{
          const rows=[['Date','Activities','Transactions','Contacts','Challenges','Plan']];
          mine.forEach(r=>rows.push([r.date,r.activities||r.text||'',r.transactions||'',r.contacts||'',r.challenges||'',r.plan||'']));
          const csv=rows.map(r=>r.map(v=>'"'+(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
          const a=document.createElement('a');
          a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
          a.download=`RehoVTU_Report_${user.code}_${TODAY}.csv`;
          a.click();
        }} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:8,padding:'6px 12px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
          ⬇ Export CSV
        </button>}
      </div>

      {months.length===0&&<div style={{textAlign:'center',color:'var(--muted)',marginTop:20}}>No reports yet.</div>}

      {months.map(mk=>{
        const [y,m]=mk.split('-').map(Number);
        const monthReports=[...byMonth[mk]].sort((a,b)=>b.date>a.date?1:-1);
        const missed=getMissedDays(reports,user.code,y,m);
        const isOpen=openMonth===mk;
        return(
          <div key={mk} style={{background:'#fff',borderRadius:14,boxShadow:'var(--shadow)',overflow:'hidden'}}>
            {/* Month header — tap to open/close */}
            <div onClick={()=>setOpenMonth(isOpen?null:mk)}
              style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                padding:'12px 14px',cursor:'pointer',background:isOpen?'var(--blue)':'#fff',
                transition:'background .2s'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:20}}>📁</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:isOpen?'#fff':'var(--text)'}}>{getMonthLabel(mk)}</div>
                  <div style={{fontSize:11,color:isOpen?'rgba(255,255,255,.7)':'var(--muted)'}}>
                    {monthReports.length} report{monthReports.length!==1?'s':''}
                    {missed.length>0&&<span style={{color:isOpen?'#fca5a5':'#dc2626',fontWeight:700}}> · {missed.length} missed</span>}
                  </div>
                </div>
              </div>
              <span style={{color:isOpen?'#fff':'var(--muted)',fontSize:18}}>{isOpen?'▾':'▸'}</span>
            </div>

            {isOpen&&(
              <div style={{padding:'10px 14px'}}>
                {/* Missed days warning */}
                {missed.length>0&&(
                  <div style={{background:'#fee2e2',borderRadius:10,padding:'8px 12px',marginBottom:10,fontSize:12,color:'#dc2626',fontWeight:600}}>
                    ⚠️ Missed daily reports: {missed.map(d=>`${d} ${getMonthLabel(mk).split(' ')[0]}`).join(', ')}
                  </div>
                )}

                {/* Reports list */}
                {monthReports.map(r=>(
                  <div key={r.id} style={{borderBottom:'1px solid var(--border)',paddingBottom:10,marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                      <span style={{fontSize:11,fontWeight:700,padding:'2px 10px',borderRadius:99,
                        background:typeColor[r.type]||'#eee',color:typeText[r.type]||'#333'}}>

                    {r.activities?(
                      <div style={{fontSize:13,lineHeight:1.7,marginBottom:6}}>
                        <div style={{marginBottom:3}}><b style={{color:'var(--blue)'}}>✅ Activities:</b> {r.activities}</div>
                        <div style={{marginBottom:3}}><b style={{color:'#1b5e20'}}>💰 Transactions:</b> {r.transactions}</div>
                        <div style={{marginBottom:3}}><b style={{color:'#e65100'}}>👥 Contacts:</b> {r.contacts}</div>
                        {r.challenges&&<div style={{marginBottom:3}}><b style={{color:'#c62828'}}>⚠️ Challenges:</b> {r.challenges}</div>}
                        <div><b style={{color:'#4A148C'}}>📅 Tomorrow:</b> {r.plan}</div>
                      </div>
                    ):(
                      <div style={{fontSize:13,lineHeight:1.6,marginBottom:6}}>{r.text}</div>
                    )}

                    {/* Replies */}
                    {(r.replies||[]).map((rep,i)=>(
                      <div key={i} style={{marginLeft:12,paddingLeft:10,borderLeft:'2px solid var(--gold)',
                        fontSize:12,color:'var(--muted)',marginBottom:4,background:'#fefce8',
                        borderRadius:'0 6px 6px 0',padding:'4px 8px'}}>
                        <b style={{color:'var(--text)'}}>{rep.by}:</b> {rep.text}
                        <span style={{fontSize:10,marginLeft:6}}>{fmtTime(rep.time)}</span>
                      </div>
                    ))}

                    {/* Reply box */}
                    {replyTarget===r.id?(
                      <div style={{marginTop:6,display:'flex',gap:6}}>
                        <input value={replyText} onChange={e=>setReplyText(e.target.value)}
                          placeholder="Write reply..." onKeyDown={e=>e.key==='Enter'&&submitReply(r.id)}
                          style={{flex:1,padding:'7px 10px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:12,outline:'none'}}/>
                        <Btn small onClick={()=>submitReply(r.id)}>Send</Btn>
                        <Btn small variant="outline" onClick={()=>setReplyTarget(null)}>✕</Btn>
                      </div>
                    ):(
                      <button onClick={()=>setReplyTarget(r.id)}
                        style={{marginTop:4,background:'none',border:'none',color:'var(--blue)',
                          fontSize:11,fontWeight:600,cursor:'pointer'}}>
                        💬 Reply
                      </button>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

                            placeholder="Write reply..." onKeyDown={e=>e.key==='Enter'&&submitReply(r.id)}
                            style={{flex:1,padding:'7px 10px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:12,outline:'none'}}/>
                          <Btn small onClick={()=>submitReply(r.id)}>Send</Btn>

                      ):(

                          💬 Reply
                        </button>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  }

  // Member list view
  return(
    <div style={{paddingBottom:16}}>
      <div style={{fontWeight:700,marginBottom:10,fontSize:14}}>
        📋 Team Report Files ({reportingTo.length} members)
      </div>
      {reportingTo.map(m=>{
        const mReports=getMemberReports(m.code);
        const thisMonth=getMonthKey(TODAY);
        const thisMonthReports=mReports.filter(r=>getMonthKey(r.date)===thisMonth);
        const [y,mo]=thisMonth.split('-').map(Number);
        const missed=getMissedDays(reports,m.code,y,mo);
        const lastReport=mReports.sort((a,b)=>b.date>a.date?1:-1)[0];
        return(
          <div key={m.code||m.id} onClick={()=>setSelectedMember(m)}
            style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,
              boxShadow:'var(--shadow)',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
            <Ava user={m} size={36}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{m.name}</div>
              <Bdg role={m.role} small/>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>
                {thisMonthReports.length} this month
                {missed.length>0&&<span style={{color:'#dc2626',fontWeight:700}}> · {missed.length} missed ⚠️</span>}
              </div>
              {lastReport&&<div style={{fontSize:11,color:'var(--muted)'}}>Last: {fmtDate(lastReport.date)}</div>}

              <div style={{fontWeight:800,fontSize:16,color:'var(--blue)'}}>{mReports.length}</div>

        );

      {reportingTo.length===0&&<div style={{textAlign:'center',color:'var(--muted)',marginTop:30}}>No team members yet.</div>}
    </div>
  );
}

function TeamTab({user,users,signups,reports}){
  const {start}=getMonthRange();
  const [selected,setSelected]=useState(null);
  const confirmedMonth=signups.filter(s=>s.date>=start&&s.founderApproved!==false);
  const myTeam=Object.values(users).filter(u=>(u.ref===user.code||u.referredBy===user.code)&&u.approved&&!u.resigned);

  const getTeamSu=(m)=>{
    if(m.role==='ambassador') return confirmedMonth.filter(s=>s.ref===m.code).length;
    if(m.role==='cc'){
      const ambs=Object.values(users).filter(u=>(u.ref===m.code||u.referredBy===m.code)&&u.approved&&!u.resigned);
      return confirmedMonth.filter(s=>ambs.map(a=>a.code).includes(s.ref)).length;
    }
    if(m.role==='pm'){
      const ccs=Object.values(users).filter(u=>(u.ref===m.code||u.referredBy===m.code)&&u.approved&&!u.resigned);
      const ambs=Object.values(users).filter(u=>ccs.map(c=>c.code).includes(u.referredBy)&&u.approved&&!u.resigned);
      return confirmedMonth.filter(s=>ambs.map(a=>a.code).includes(s.ref)).length;
    }
    if(m.role==='pfc'){
      const tree=getFullTree(m.code||m.id,users);
      const ambs=Object.values(users).filter(u=>tree.includes(u.code||u.id)&&u.role==='ambassador'&&u.approved&&!u.resigned);
      return confirmedMonth.filter(s=>ambs.map(a=>a.code).includes(s.ref)).length;

    return 0;
  };
  const getTgt=(role)=>({ambassador:100,cc:2000,pm:20000,pfc:100000}[role]||100);

  return(
    <div>
      {selected&&<MemberSummaryModal member={selected} users={users} signups={signups} reports={reports||[]} onClose={()=>setSelected(null)}/>}

        const su=getTeamSu(m);
        const tgt=getTgt(m.role);
        const pct=Math.min(100,Math.round(su/tgt*100));
        const direct=Object.values(users).filter(u=>(u.ref===m.code||u.referredBy===m.code)&&u.approved&&!u.resigned).length;
        return(
          <div key={m.code||m.id} onClick={()=>setSelected(m)}
            style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,boxShadow:'var(--shadow)',cursor:'pointer'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <Ava user={m} size={36}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{m.name}</div>
                <div style={{display:'flex',gap:6,alignItems:'center',marginTop:2}}>
                  <Bdg role={m.role} small/>
                  {direct>0&&<span style={{fontSize:10,color:'var(--muted)'}}>· {direct} direct</span>}
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontWeight:800,fontSize:18,color:'var(--blue)'}}>{su.toLocaleString()}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>sign-ups</div>
              </div>
              <span style={{color:'var(--muted)',fontSize:20,marginLeft:4}}>›</span>
            </div>
            <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>{su.toLocaleString()} / {tgt.toLocaleString()} · {pct}%</div>
            <div style={{background:'var(--bg)',borderRadius:99,height:6}}>
              <div style={{background:pct>=80?'var(--green)':pct>=50?'var(--gold)':'#dc2626',width:pct+'%',height:'100%',borderRadius:99,transition:'width .4s'}}/>
            </div>
          </div>
        );
      })}
      {myTeam.length===0&&<div style={{textAlign:'center',color:'var(--muted)',marginTop:40,fontSize:14}}>No team members yet.</div>}
    </div>
  );
}

function RecTab({user,users,saveUsers,pushNotif}){
  const [sel,setSel]=useState('');const [verdict,setVerdict]=useState('Maintain');const [note,setNote]=useState('');const [ok,setOk]=useState('');
  const downRole=DOWNLINE[user.role];
  const cands=Object.values(users).filter(u=>u.role===downRole&&u.approved);
  const submit=async()=>{
    if(!sel)return;
    const t=users[sel];if(!t)return;
    const rec={by:user.code,byName:user.name,verdict,note,date:TODAY};
    await saveUsers({...users,[sel]:{...t,recommendation:rec}});
    await pushNotif(sel,`${user.name} submitted a recommendation for you: ${verdict}`);
    setOk('Recommendation submitted!');setNote('');setTimeout(()=>setOk(''),3000);
  };
  return(
    <div style={{background:'#fff',borderRadius:14,padding:'16px',boxShadow:'var(--shadow)'}}>

      <Sel label="Verdict" value={verdict} onChange={e=>setVerdict(e.target.value)}
        options={['Promote','Maintain','Watch','Downgrade'].map(v=>({v,l:v}))}/>
      <Inp label="Note" value={note} onChange={e=>setNote(e.target.value)} placeholder="Write your recommendation..." rows={3}/>
      <Btn onClick={submit} full>Submit</Btn>
    </div>

}

function ConfirmTab({signups,saveSignups,pushNotif}){
  const pending=signups.filter(s=>s.pfcStatus==='Pending');
  const confirm=async id=>{
    const ns=signups.map(s=>s.id===id?{...s,pfcStatus:'Confirmed'}:s);
    await saveSignups(ns);
    const su=signups.find(s=>s.id===id);
    if(su?.ref)await pushNotif(su.ref,`Sign-up from ${su.name} confirmed!`);
  };
  const reject=async id=>{await saveSignups(signups.map(s=>s.id===id?{...s,pfcStatus:'Rejected'}:s));};
  return(
    <div>
      <div style={{fontWeight:700,marginBottom:10,fontSize:14}}>Pending Confirmations ({pending.length})</div>
      {pending.map(s=>(
        <div key={s.id} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,boxShadow:'var(--shadow)'}}>
          <div style={{fontWeight:600}}>{s.name}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>{s.email} · {s.phone}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>Site: {s.siteName} · Ref: {s.ref||'None'}</div>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <Btn small onClick={()=>confirm(s.id)} variant="green">✓ Confirm</Btn>
            <Btn small onClick={()=>reject(s.id)} variant="danger">✗ Reject</Btn>
          </div>
        </div>
      ))}
      {pending.length===0&&<div style={{textAlign:'center',color:'var(--muted)',marginTop:40}}>No pending confirmations.</div>}
    </div>
  );
}

// ── TREE HELPERS ───────────────────────────────────────────────────────────
// Returns all codes in the full downline tree under a given code (BFS)
function getFullTree(rootCode, allUsers){
  const result=[];
  const queue=[rootCode];
  while(queue.length){
    const cur=queue.shift();
    const children=Object.values(allUsers).filter(u=>u.referredBy===cur||u.ref===cur);
    children.forEach(c=>{result.push(c.code||c.id);queue.push(c.code||c.id);});
  }
  return result;
}

  const revenue=thisMonthSu.length*950;

  // ── APPROVE MEMBER ──
  const approveMember=async id=>{
    const u=users[id];if(!u)return;
    const nc=genCode(u.role,users);
    // Build approved record — keep original password and email exactly as registered
    const approved={
      ...u,
      id:nc,
      code:nc,
      approved:true,
      // Normalize email to lowercase
      email:(u.email||'').toLowerCase(),
      notifications:[
        {msg:`✅ Your account has been approved! Your member code is ${nc}. Log in with your registered email and password.`,
         time:new Date().toISOString(),read:false},
        ...(u.notifications||[])
      ]
    };
    // Merge with localStorage to avoid wiping other members
    const freshUsers=JSON.parse(localStorage.getItem('rv_users')||'{}');
    const nu={...freshUsers,...users,[nc]:approved};
    delete nu[id];
    await saveUsers(nu);
    alert(`✅ ${u.name} Approved!\n\nCode: ${nc}\nEmail: ${u.email}\nPassword: (their own password)\n\nThey can log in immediately with their email and password.`);
  };
  const rejectMember=async id=>{const nu={...users};delete nu[id];await saveUsers(nu);};

  // ── APPROVE SIGN-UP + PAYMENT TREE ──
  const approveSignup=async id=>{
    const ns=signups.map(s=>s.id===id?{...s,founderApproved:true,pfcStatus:'Confirmed'}:s);
    await saveSignups(ns);
    const su=signups.find(s=>s.id===id);
    if(!su)return;
    const notifyChain=async(code,depth=0)=>{
      if(!code||depth>5)return;
      const m=users[code];if(!m)return;
      await pushNotif(code,`💰 Payment confirmed: ${su.name} joined via your network!`);
      if(m.email){const{subject:ps,html:ph}=EMAILS.paymentConfirmed(m.name,su.name,ROLE_LABELS[su.role]||su.role);await sendEmail(m.email,m.name,ps,ph);}
      if(m.ref)await notifyChain(m.ref,depth+1);
    };
    if(su.ref)await notifyChain(su.ref);
    await pushNotif('FOUNDER',`💰 Payment confirmed: ${su.name}.`);
  };
  const rejectSignup=async id=>{
    const ns=signups.map(s=>s.id===id?{...s,founderApproved:false,pfcStatus:'Rejected'}:s);
    await saveSignups(ns);
  };

  // ── RESIGN + TREE TRANSFER ──
  // getFullTree is defined outside: returns all descendant codes
  const doResign=async(resignedCode, replacementCode)=>{
    if(!replacementCode){alert('Please choose a replacement first.');return;}
    const nu={...users};
    const resigned=nu[resignedCode];
    if(!resigned)return;
    // 1. Find direct reports of resigned person
    const directReports=Object.values(nu).filter(u=>u.referredBy===resignedCode);
    // 2. Reassign their referredBy to replacement
    directReports.forEach(u=>{
      const k=u.code||u.id;
      nu[k]={...nu[k],referredBy:replacementCode};
    });
    // 3. Mark resigned person as resigned (locked out, kept in records)
    nu[resignedCode]={...resigned,resigned:true,approved:false,resignedDate:TODAY};
    await saveUsers(nu);
    await pushNotif(replacementCode,`You have inherited the downline of ${resigned.name} (${resignedCode}).`);

      </Modal>
    );

        <div style={{background:'#fff8f0',border:'1px solid var(--gold)',borderRadius:10,padding:'10px 12px',marginBottom:14,fontSize:12,color:'#92400e'}}>
          ⚡ Use this to add members directly — bypasses registration. Great when Supabase is down or someone can't register.
        </div>
        {err&&<Alrt type="error" msg={err} onClose={()=>setErr('')}/>}
        {ok&&<Alrt type="success" msg={ok}/>}
        <Inp label="Full Name" value={form.name} onChange={set('name')} required/>
        <Inp label="Email" value={form.email} onChange={set('email')} type="email" required/>
        <Inp label="Phone" value={form.phone} onChange={set('phone')} type="tel"/>
        <PwInp label="Password" value={form.password} onChange={set('password')}/>
        <Inp label="State" value={form.state} onChange={set('state')} placeholder="e.g. Lagos"/>
        <Sel label="Role" value={form.role} onChange={set('role')} options={[
          {v:'ambassador',l:'Ambassador'},
          {v:'cc',l:'Campus Coordinator (CC)'},
          {v:'pm',l:'State Project Manager (PM)'},
          {v:'pfc',l:'Project & Finance Coordinator (PFC)'}
        ]}/>
        <Inp label="Referred By (code)" value={form.ref} onChange={set('ref')} placeholder="e.g. CC001"/>
        <div style={{background:'#f8f9ff',borderRadius:10,padding:'12px',marginBottom:4}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',marginBottom:8}}>Bank Details (optional)</div>
          <Inp label="Account Name" value={form.accName} onChange={set('accName')}/>
          <Inp label="Account Number" value={form.accNum} onChange={set('accNum')}/>
          <Inp label="Bank Name" value={form.bank} onChange={set('bank')}/>
        </div>
        <Btn full onClick={add} variant="green" style={{marginTop:8}}>➕ Add Member & Generate Code</Btn>
      </Modal>
    );
  };

  // ── CSV EXPORT (all roles) ──
  const exportCSV=()=>{
    const rows=ROLES.filter(r=>r!=='founder').flatMap(role=>
      Object.values(users).filter(u=>u.role===role&&u.approved&&!u.resigned).map(u=>{
        const su=signups.filter(s=>s.ref===u.code&&s.date>=start&&s.founderApproved!==false).length;
        const {gross,totalDed,totalBon,net}=calcNet(su,u.deductions,u.bonuses);
        return `"${u.name}",${ROLE_LABELS[role]},${u.code},${u.state||''},${su},${gross},${totalDed},${totalBon},${net},"${u.accName||''}","${u.accNum||''}","${u.bank||''}"`;
      })
    );
    const blob=new Blob(['Name,Role,Code,State,Signups,Gross,Ded,Bonus,Net,AccName,AccNum,Bank\n'+rows.join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rehovtu_payroll.csv';a.click();
  };

  const pendingCount=pendingMembers.length+pendingSignups.filter(s=>s.founderApproved===undefined).length;

  const TABS=[
    {id:'overview',label:'Overview'},
    {id:'signups_q',label:'Sign-ups',badge:pendingSignups.filter(s=>s.founderApproved===undefined).length},
    {id:'ambs',label:'Ambs'},
    {id:'ccs',label:'CCs'},
    {id:'pms',label:'PMs'},
    {id:'pfcs',label:'PFCs'},
    {id:'allsu',label:'All SU'},
    {id:'leaderboard',label:'🏆'},
    {id:'broadcasts',label:'📢'},
    {id:'settings',label:'⚙️'},
  ];

  return(
    <div>
      {fineTarget&&<Modal title="Fines & Bonuses" onClose={()=>setFineTarget(null)}>
        <FineManager target={fineTarget} users={users} saveUsers={saveUsers} pushNotif={pushNotif}/>
      </Modal>}
      {resignTarget&&<ResignModal u={resignTarget}/>}
      {promoteTarget&&<PromoteModal u={promoteTarget}/>}
      {transferTarget&&<TransferModal u={transferTarget}/>}
      {showManualAdd&&<ManualAddModal/>}

      {/* Quick action row */}
      <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
        <Btn small variant="green" onClick={()=>setShowManualAdd(true)}>➕ Add Member</Btn>
        <Btn small variant="ghost" onClick={()=>setTab('settings')}>⚙ Settings</Btn>
        <Btn small variant="ghost" onClick={exportCSV}>↓ CSV</Btn>
        <Btn small variant="primary" onClick={()=>setTab('broadcasts')}>📢 Broadcast</Btn>
        {pendingCount>0&&<Btn small variant="danger" onClick={()=>setTab('pending')}>⚠ {pendingCount} Pending</Btn>}
      </div>

      <Tabs tabs={TABS} active={tab} onSelect={setTab}/>
      <div style={{marginTop:12}}>
        {tab==='overview'&&<Overview/>}
        {tab==='pending'&&<PendingMembersTab/>}
        {tab==='signups_q'&&<PendingSignupsTab/>}
        {tab==='ambs'&&<RoleList role="ambassador"/>}
        {tab==='ccs'&&<RoleList role="cc"/>}
        {tab==='pms'&&<RoleList role="pm"/>}
        {tab==='pfcs'&&<RoleList role="pfc"/>}
        {tab==='allsu'&&<AllSignupsTab signups={signups} saveSignups={saveSignups}/>}
        {tab==='leaderboard'&&<LeaderboardTab/>}
        {tab==='broadcasts'&&<BroadcastsTab/>}
        {tab==='settings'&&<SettingsTab/>}
      </div>
    </div>
  );
}

// ── APP STATE ──────────────────────────────────────────────────────────────
function useAppState(){
  const [screen,setScreen]=useState('loading');
  const [user,setUser]=useState(null);
  const [users,setUsers]=useState({});
  const [signups,setSignups]=useState([]);
  const [settings,setSettings]=useState(DEFAULT_SETTINGS);
  const [broadcasts,setBroadcasts]=useState([]);
  const [dms,setDms]=useState([]);
  const [grp,setGrp]=useState([]);
  const [reports,setReports]=useState([]);

  const saveUsers=async u=>{
    setUsers(u);
    // Save to localStorage immediately as backup
    try{localStorage.setItem('rv_users',JSON.stringify(u));}catch{}
    // Then save to Firebase
    await DB.set('users',u);
  };
  const saveSignups=async s=>{setSignups(s);await DB.set('signups',s);};
  const saveSettings=async s=>{
    setSettings(s);
    // Clear localStorage cache so ALL devices fetch fresh from Firebase
    try{localStorage.setItem('rv_settings',JSON.stringify(s));}catch{}
    await DB.set('settings',s);
  };
  const saveBroadcasts=async b=>{setBroadcasts(b);await DB.set('broadcasts',b);};
  const saveDms=async d=>{setDms(d);await DB.set('dms',d);};
  const saveGrp=async g=>{setGrp(g);await DB.set('grp',g);};
  const saveReports=async r=>{setReports(r);await DB.set('reports',r);};

  const pushNotif=async(code,msg)=>{
    const nu={...users};
    if(nu[code]){
      nu[code].notifications=[{msg,time:new Date().toISOString(),read:false},...(nu[code].notifications||[])];
      await saveUsers(nu);
    }
  };

  useEffect(()=>{
    const ref=new URLSearchParams(window.location.search).get('ref');
    if(ref)sessionStorage.setItem('ref_code',ref);
    const rc=sessionStorage.getItem('ref_code');

    // INSTANT LOAD from localStorage so users never see empty
    const lsU=JSON.parse(localStorage.getItem('rv_users')||'{}');
    if(!lsU['FOUNDER'])lsU['FOUNDER']=FOUNDER_ACCT;
    const lsS=JSON.parse(localStorage.getItem('rv_signups')||'[]');
    const lsSt=JSON.parse(localStorage.getItem('rv_settings')||'null');
    const lsB=JSON.parse(localStorage.getItem('rv_broadcasts')||'[]');
    const lsD=JSON.parse(localStorage.getItem('rv_dms')||'[]');
    const lsG=JSON.parse(localStorage.getItem('rv_grp')||'[]');
    const lsR=JSON.parse(localStorage.getItem('rv_reports')||'[]');
    setUsers(lsU);setSignups(lsS);setSettings(lsSt||DEFAULT_SETTINGS);
    setBroadcasts(lsB);setDms(lsD);setGrp(lsG);setReports(lsR);

    // If came via ref link, go straight to registration after setting local data
    if(rc){setTimeout(()=>setScreen('team'),300);return;}

    // Show landing immediately from localStorage, then sync Firebase in background
    setScreen('landing');

    // Background Firebase sync — updates data silently without disrupting user
    const syncFirebase=async(attempt=1)=>{
      try{
        const[u,s,st,b,d,g,r]=await Promise.all([
          DB.get('users'),DB.get('signups'),DB.get('settings'),
          DB.get('broadcasts'),DB.get('dms'),DB.get('grp'),DB.get('reports')
        ]);
        const au=u||{};
        if(!au['FOUNDER'])au['FOUNDER']=FOUNDER_ACCT;
        // Only update if Firebase returned meaningful data
        if(Object.keys(au).length>0)setUsers(au);
        if(s&&s.length>=0)setSignups(s);
        if(st)setSettings(st);
        if(b&&b.length>=0)setBroadcasts(b);
        if(d&&d.length>=0)setDms(d);
        if(g&&g.length>=0)setGrp(g);
        if(r&&r.length>=0)setReports(r);
      }catch(e){
        console.warn('Firebase sync attempt',attempt,'failed:',e);
        if(attempt<5)setTimeout(()=>syncFirebase(attempt+1),attempt*3000);
      }
    };
    setTimeout(syncFirebase,1000);
  },[]);

  // sync logged-in user with store
  useEffect(()=>{
    if(user&&users){
      const k=user.code||user.id;
      if(users[k]&&JSON.stringify(users[k])!==JSON.stringify(user))setUser(users[k]);
    }
  },[users]);


  useEffect(()=>{
    if(!Object.keys(users).length||!reports.length)return;
    const now=new Date();
    const todayStr=now.toISOString().split('T')[0];
    if(now.getDay()===0)return;
    if(now.getHours()<22)return;
    const dedKey='rv_ded_'+todayStr;
    if(localStorage.getItem(dedKey))return;
    const members=Object.values(users).filter(u=>u.approved&&u.id!=='FOUNDER'&&!u.resigned&&u.role!=='founder');
    let changed=false;const nu={...users};
    members.forEach(u=>{
      if(!DEDUCTIONS[u.role])return;
      const submitted=reports.some(r=>r.userCode===u.code&&r.date===todayStr&&r.type==='daily');
      if(!submitted){
        const ded=DEDUCTIONS[u.role].daily||500;
        nu[u.code]={...nu[u.code],deductions:[...(nu[u.code].deductions||[]),{amount:ded,reason:`Missed daily report — ${todayStr}`,date:todayStr,type:'auto'}]};
        nu[u.code].notifications=[{msg:`⚠️ ₦${ded.toLocaleString()} deducted: missed daily report on ${todayStr}.`,time:new Date().toISOString(),read:false},...(nu[u.code].notifications||[])];
        changed=true;
      }
    });
    if(changed){
      members.forEach(async u=>{
        if(!DEDUCTIONS[u.role])return;
        const submitted=reports.some(r=>r.userCode===u.code&&r.date===todayStr&&r.type==='daily');
        if(!submitted&&u.email){
          const ded=DEDUCTIONS[u.role].daily||500;
          const{subject:ms,html:mh}=EMAILS.missedReport(u.name,ROLE_LABELS[u.role]||u.role,todayStr,ded);
          await sendEmail(u.email,u.name,ms,mh);
        }
      });
      saveUsers(nu);localStorage.setItem(dedKey,'1');
    }
  },[users,reports]);
  return{screen,setScreen,user,setUser,users,saveUsers,signups,saveSignups,settings,saveSettings,broadcasts,saveBroadcasts,dms,saveDms,grp,saveGrp,reports,saveReports,pushNotif};
}

// ── ROOT ───────────────────────────────────────────────────────────────────
function App(){
  const appState=useAppState();
  const{screen,setScreen,user,setUser,users,saveUsers}=appState;
  const login=useCallback(u=>{setUser(u);setScreen('dashboard');},[]);
  const logout=useCallback(()=>{setUser(null);sessionStorage.clear();setScreen('landing');},[]);
  const nav=useCallback(s=>setScreen(s),[]);

  if(screen==='loading')return <LoadingScreen/>;
  if(screen==='landing')return <Landing onNavigate={nav}/>;
  if(screen==='login')return <LoginScreen users={users} onLogin={login} onNavigate={nav}/>;
  if(screen==='forgot')return <ForgotPassword users={users} saveUsers={saveUsers} onNavigate={nav}/>;
  if(screen==='student')return <StudentReg settings={appState.settings} saveSignups={appState.saveSignups} signups={appState.signups} onNavigate={nav}/>;
  if(screen==='team')return <TeamReg users={users} saveUsers={saveUsers} onNavigate={nav}/>;
  if(screen==='dashboard'&&user){
    if(user.role==='founder')return <FounderDashboard user={user} appState={appState} onLogout={logout}/>;
    return <MemberDashboard user={user} appState={appState} onLogout={logout}/>;
  }
  return <Landing onNavigate={nav}/>;
}

// ── PWA INSTALL PROMPT ─────────────────────────────────────────────────────
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  // Show install button immediately when prompt is available
  document.getElementById('install-btn-wrap')&&(document.getElementById('install-btn-wrap').style.display='block');
});

window.addEventListener('appinstalled',()=>{
  _installPrompt=null;
});

function triggerInstall() {
  if (_installPrompt) {
    _installPrompt.prompt();
    _installPrompt.userChoice.then(()=>{ _installPrompt = null; });
  } else {
    // Detect device
    const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    const isAndroid=/android/i.test(navigator.userAgent);
    if(isIOS){
      alert('📱 Install on iPhone/iPad:\n\n1. Tap the Share button at the bottom (the box with arrow ↑)\n2. Scroll down and tap "Add to Home Screen"\n3. Tap "Add" — done!');
    } else if(isAndroid){
      alert('📱 Install on Android:\n\n1. Tap the 3 dots menu ⋮ at the top right of your browser\n2. Tap "Add to Home screen" or "Install app"\n3. Tap "Install" — done!\n\nIf you don\'t see it, try opening the site in Chrome browser.');
    } else {
      alert('💻 Install on Desktop:\n\nLook for the install icon (⊕) in your browser address bar and click it.');
    }
  }
}

ReactDOM.render(<App/>,document.getElementById('root'));
