// ── FIREBASE ──────────────────────────────────────────────────────────────────
async function fbGet(key){
  try{
    const r=await fetch(`${FB_BASE}/${encodeURIComponent(key)}?key=${FB_KEY}`);
    if(!r.ok)return null;
    const d=await r.json();
    const v=d?.fields?.value?.stringValue;
    return v?JSON.parse(v):null;
  }catch{return null;}
}
async function fbSet(key,val){
  try{
    const body=JSON.stringify({fields:{value:{stringValue:JSON.stringify(val)}}});
    const r=await fetch(`${FB_BASE}/${encodeURIComponent(key)}?updateMask.fieldPaths=value&key=${FB_KEY}`,
      {method:'PATCH',headers:{'Content-Type':'application/json'},body});
    if(r.ok)return true;
    const r2=await fetch(`${FB_BASE}?documentId=${encodeURIComponent(key)}&key=${FB_KEY}`,
      {method:'POST',headers:{'Content-Type':'application/json'},body});
    return r2.ok;
  }catch{return false;}
}
const lsGet=k=>{try{const v=localStorage.getItem('rho_'+k);return v?JSON.parse(v):null;}catch{return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem('rho_'+k,JSON.stringify(v));}catch{}};
const dbGet=async k=>{const r=await fbGet(k);return r!==null?r:lsGet(k);};
const dbSet=async(k,v)=>{lsSet(k,v);await fbSet(k,v);};

function getWeekKey(date=TODAY){
  const d=new Date(date);
  const jan1=new Date(d.getFullYear(),0,1);
  const week=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}
function getMonthKey(date=TODAY){return date.slice(0,7);}

// CSV Export
function exportCSV(rows,filename){
  if(!rows.length)return;
  const headers=Object.keys(rows[0]);
  const csv=[headers.join(','),...rows.map(r=>headers.map(h=>`"${String(r[h]||'').replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename+'.csv';a.click();
}

// ── REGISTER ──────────────────────────────────────────────────────────────────
function Register({onBack,users,saveUsers}){
  const[form,setForm]=useState({name:'',phone:'',email:'',password:'',role:'ambassador',secQ:"What is your mother's maiden name?",secA:''});
  const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
  const s=v=>e=>setForm(f=>({...f,[v]:e.target.value}));
  const submit=async()=>{
    if(!form.name||!form.phone||!form.email||!form.password||!form.secA){setErr('Fill all required fields');return;}
    const all=Object.values(users||{});
    if(all.find(u=>u.email?.toLowerCase()===form.email.toLowerCase())){setErr('Email already registered');return;}
    setLoading(true);
    const code=genCode(form.name);
    const user={id:genId(),name:form.name,phone:form.phone,email:form.email,password:form.password,
      role:form.role,code,joined:TODAY,approved:true,resigned:false,
      securityQ:form.secQ,securityA:form.secA.toLowerCase().trim(),
      deductions:[],notifications:[]};
    await saveUsers({...users,[user.id]:user});
    await sendEmail(form.email,form.name,'Welcome to RehoVTU! 🎉',
      emailTpl('Welcome to the Team!',`<p>Hi <strong>${form.name}</strong>, you're now registered as a <strong>${ROLE_LABELS[form.role]}</strong>.</p><p>Your team code is: <strong style="font-size:20px;color:#1a237e">${code}</strong></p><p>Login at: <a href="${window.location.href}">${window.location.href}</a></p>`));
    setLoading(false);
    // Auto login
    lsSet('session',{id:user.id});
    window.location.reload();
  };
  return<div style={{minHeight:'100vh',background:'var(--blue)',padding:'20px 16px'}}>
    <button onClick={onBack} style={{color:'rgba(255,255,255,.7)',background:'none',border:'none',fontSize:14,cursor:'pointer',marginBottom:14}}>← Back</button>
    <div style={{background:'#fff',borderRadius:18,padding:22,maxWidth:440,margin:'0 auto'}}>
      <h2 style={{fontWeight:800,fontSize:19,color:'var(--blue)',marginBottom:18}}>Create Account</h2>
      {err&&<Alrt type="error" msg={err} onClose={()=>setErr('')}/>}
      <Inp label="Full Name" value={form.name} onChange={s('name')} required/>
      <Inp label="Phone Number" type="tel" value={form.phone} onChange={s('phone')} required/>
      <Inp label="Email Address" type="email" value={form.email} onChange={s('email')} required/>
      <PwInp label="Create Password" value={form.password} onChange={s('password')} id="regpw"/>
      <div style={{marginBottom:13}}>
        <label style={{display:'block',fontWeight:600,fontSize:13,marginBottom:4}}>Role <span style={{color:'var(--red)'}}>*</span></label>
        <select value={form.role} onChange={s('role')} style={{width:'100%',padding:'10px 12px',border:'1.5px solid var(--border)',borderRadius:10,fontSize:14,background:'#fff'}}>
          <option value="ambassador">Ambassador</option>
          <option value="cc">Campus Coordinator (CC)</option>
          <option value="pm">Project Manager (PM)</option>
          <option value="pfc">PFC</option>
          <option value="hr">HR Manager</option>
          <option value="smm">Social Media Manager</option>
        </select>
      </div>
      <div style={{marginBottom:13}}>
        <label style={{display:'block',fontWeight:600,fontSize:13,marginBottom:4}}>Security Question</label>
        <select value={form.secQ} onChange={s('secQ')} style={{width:'100%',padding:'10px 12px',border:'1.5px solid var(--border)',borderRadius:10,fontSize:14,background:'#fff'}}>
          <option>What is your mother's maiden name?</option>
          <option>What was your first pet's name?</option>
          <option>What city were you born in?</option>
          <option>What is your favourite food?</option>
        </select>
      </div>
      <Inp label="Security Answer" value={form.secA} onChange={s('secA')} required/>
      <Btn onClick={submit} full disabled={loading}>{loading?'Creating account...':'Create Account & Login →'}</Btn>
    </div>
  </div>;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({users,onLogin,onNavigate}){
  const[id,setId]=useState('');const[pw,setPw]=useState('');
  const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
  const login=async()=>{
    setErr('');setLoading(true);
    await new Promise(r=>setTimeout(r,300));
    if((id.toLowerCase()===FOUNDER.email.toLowerCase()||id.toUpperCase()==='FOUNDER')&&pw===FOUNDER.password){
      onLogin(FOUNDER);setLoading(false);return;
    }
    const all=Object.values(users||{});
    const user=all.find(u=>u.email?.toLowerCase()===id.toLowerCase()||u.code?.toUpperCase()===id.toUpperCase());
    if(!user){setErr('User not found');setLoading(false);return;}
    if(user.password!==pw){setErr('Wrong password');setLoading(false);return;}
    if(user.resigned){setErr('Account deactivated');setLoading(false);return;}
    onLogin(user);setLoading(false);
  };
  return<div style={{minHeight:'100vh',background:'var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style={{width:'100%',maxWidth:380}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontWeight:900,fontSize:38,color:'#fff'}}>Reho<span style={{color:'var(--gold2)'}}>VTU</span></div>
      </div>
      <div style={{background:'#fff',borderRadius:18,padding:24}}>
        <h2 style={{fontWeight:800,fontSize:18,marginBottom:18}}>Team Login</h2>
        {err&&<Alrt type="error" msg={err} onClose={()=>setErr('')}/>}
        <Inp label="Email or Team Code" value={id} onChange={e=>setId(e.target.value)}/>
        <PwInp label="Password" value={pw} onChange={e=>setPw(e.target.value)} id="loginpw"/>
        <Btn onClick={login} full disabled={loading}>{loading?'Logging in...':'Login →'}</Btn>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:14}}>
          <button onClick={()=>onNavigate('forgot')} style={{background:'none',border:'none',color:'var(--blue)',fontSize:13,cursor:'pointer'}}>Forgot password?</button>
          <button onClick={()=>onNavigate('landing')} style={{background:'none',border:'none',color:'var(--muted)',fontSize:13,cursor:'pointer'}}>← Back</button>
        </div>
      </div>
    </div>
  </div>;
}

// ── FORGOT PASSWORD ───────────────────────────────────────────────────────────
function ForgotPw({users,saveUsers,onBack}){
  const[step,setStep]=useState(1);const[email,setEmail]=useState('');const[user,setUser]=useState(null);
  const[ans,setAns]=useState('');const[pw,setPw]=useState('');const[err,setErr]=useState('');const[ok,setOk]=useState('');
  const step1=()=>{
    const all=Object.values(users||{});
    const found=all.find(u=>u.email?.toLowerCase()===email.toLowerCase())||(email.toUpperCase()==='FOUNDER'?FOUNDER:null);
    if(!found){setErr('Email not found');return;}
    setUser(found);setStep(2);setErr('');
  };
  const step2=()=>{if(ans.toLowerCase().trim()!==(user.securityA||'').toLowerCase().trim()){setErr('Wrong answer');return;}setStep(3);setErr('');};
  const step3=async()=>{
    if(!pw||pw.length<6){setErr('Min 6 characters');return;}
    if(user.id==='FOUNDER'){setOk('Cannot reset founder password here.');return;}
    await saveUsers({...users,[user.id]:{...user,password:pw}});
    setOk('Password reset! You can now login.');
  };
  return<div style={{minHeight:'100vh',background:'var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style={{background:'#fff',borderRadius:18,padding:24,width:'100%',maxWidth:380}}>
      <h2 style={{fontWeight:800,fontSize:18,marginBottom:4}}>Reset Password</h2>
      <div style={{color:'var(--muted)',fontSize:13,marginBottom:16}}>Step {step} of 3</div>
      {err&&<Alrt type="error" msg={err} onClose={()=>setErr('')}/>}
      {ok&&<Alrt type="success" msg={ok}/>}
      {!ok&&step===1&&<><Inp label="Email or Code" value={email} onChange={e=>setEmail(e.target.value)}/><Btn onClick={step1} full>Next →</Btn></>}

// ── ACTIVITY LOG TAB ──────────────────────────────────────────────────────────
function ActivityLogTab({user,logs=[],saveLogs}){
  const[form,setForm]=useState({activities:'',note:'',date:TODAY});
  const[ok,setOk]=useState('');
  const myLogs=logs.filter(l=>l.userId===user.id);
  const todayLog=myLogs.find(l=>l.date===form.date);

  const save=async()=>{
    if(!form.activities.trim()){return;}
    const entry={id:genId(),userId:user.id,userName:user.name,userCode:user.code,role:user.role,
      date:form.date,activities:form.activities.trim(),note:form.note.trim(),createdAt:new Date().toISOString()};
    let updated;
    if(todayLog){updated=logs.map(l=>l.id===todayLog.id?{...entry,id:todayLog.id}:l);}
    else{updated=[...logs,entry];}
    await saveLogs(updated);
    setOk(todayLog?'Log updated!':'Log saved!');setTimeout(()=>setOk(''),2500);
  };

  const doExport=()=>{
    const rows=myLogs.map(l=>({Date:l.date,Name:l.userName,Code:l.userCode,Role:l.role,Activities:l.activities,Note:l.note||''}));
    exportCSV(rows,`activity-log-${user.code}`);
  };

  return<div style={{padding:16}}>
    {ok&&<Alrt type="success" msg={ok}/>}
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:15}}>📅 Daily Activity Log</div>
        <Btn onClick={doExport} small variant="ghost">⬇ Export Excel</Btn>
      </div>
      <Inp label="Date" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
      <Inp label="Activities (what did you do?)" value={form.activities} onChange={e=>setForm(f=>({...f,activities:e.target.value}))} rows={4} placeholder="e.g. Visited 3 campuses, shared 10 links, had 2 meetings..."/>
      <Inp label="Additional Notes (optional)" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} rows={2} placeholder="Anything else to note..."/>
      {todayLog&&<div style={{background:'#fff3e0',borderRadius:8,padding:'8px 12px',fontSize:13,marginBottom:12,color:'#e65100'}}>⚠️ You already have a log for this date — saving will update it.</div>}
      <Btn onClick={save} full variant="green">Save Log</Btn>
    </Card>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
      <div style={{fontWeight:700,fontSize:14}}>My Logs ({myLogs.length})</div>
      {myLogs.length>0&&<Btn onClick={doExport} small variant="ghost">⬇ Export CSV</Btn>}
    </div>
    {myLogs.length===0&&<div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:24}}>No logs yet. Start logging today!</div>}
    {[...myLogs].sort((a,b)=>b.date.localeCompare(a.date)).map(l=>(
      <Card key={l.id} style={{padding:'12px 14px'}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:4,color:'var(--blue)'}}>{fmtDate(l.date)}</div>
        <div style={{fontSize:13,lineHeight:1.6,marginBottom:l.note?6:0}}>{l.activities}</div>
        {l.note&&<div style={{fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>{l.note}</div>}

    ))}
  </div>;
}

// ── REPORTS TAB ───────────────────────────────────────────────────────────────
function ReportsTab({user,users,reports=[],saveReports}){
  const[form,setForm]=useState({type:'daily',content:'',toCode:''});
  const[ok,setOk]=useState('');const[err,setErr]=useState('');

  // All uplines visible to choose from
  const uplines=useMemo(()=>{
    const all=Object.values(users||{});
    const higher=['cc','pm','pfc','founder','hr'];
    return[...all.filter(u=>u.approved&&!u.resigned&&higher.includes(u.role)&&u.id!==user.id),FOUNDER].filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i);
  },[users,user]);

  const submit=async()=>{
    if(!form.content.trim()){setErr('Write your report content');return;}
    if(!form.toCode){setErr('Select who to submit to');return;}
    const toUser=uplines.find(u=>u.code===form.toCode);
    const r={id:genId(),from:user.code,fromName:user.name,fromRole:user.role,
      to:form.toCode,toName:toUser?.name||form.toCode,
      type:form.type,content:form.content.trim(),date:TODAY,
      week:getWeekKey(),month:getMonthKey(),reviewed:false,fine:0};
    await saveReports([...(reports||[]),r]);
    // Email the recipient
    if(toUser?.email){
      await sendEmail(toUser.email,toUser.name,`New ${form.type} report from ${user.name}`,
        emailTpl(`${form.type.charAt(0).toUpperCase()+form.type.slice(1)} Report`,
          `<p><strong>${user.name}</strong> (${user.code}) submitted a ${form.type} report:</p><p style="background:#f5f5f5;padding:12px;border-radius:8px">${form.content.replace(/\n/g,'<br/>')}</p>`));
    }
    setForm(f=>({...f,content:''}));setOk('Report submitted!');setTimeout(()=>setOk(''),3000);
  };
  const myReports=reports.filter(r=>r.from===user.code);
  return<div style={{padding:16}}>
    {ok&&<Alrt type="success" msg={ok}/>}
    {err&&<Alrt type="error" msg={err} onClose={()=>setErr('')}/>}

          <option value="daily">Daily Report</option>
          <option value="weekly">Weekly Report</option>
          <option value="monthly">Monthly Report</option>
        </select>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{display:'block',fontWeight:600,fontSize:13,marginBottom:4}}>Submit To <span style={{color:'var(--red)'}}>*</span></label>
        <select value={form.toCode} onChange={e=>setForm(f=>({...f,toCode:e.target.value}))} style={{width:'100%',padding:'10px 12px',border:'1.5px solid var(--border)',borderRadius:10,fontSize:14,background:'#fff'}}>
          <option value="">-- Select upline --</option>
          {uplines.map(u=><option key={u.id} value={u.code}>{u.name} ({ROLE_LABELS[u.role]})</option>)}
        </select>
      </div>
      <Inp label="Report Content" value={form.content} onChange={e=>setForm(f=>({...f,content:e.target.value}))} rows={5} placeholder="Describe your activities, achievements, challenges..."/>
      <Btn onClick={submit} full variant="green">Submit Report ✓</Btn>
    </Card>
    <div style={{fontWeight:700,marginBottom:10,fontSize:14}}>My Submitted Reports ({myReports.length})</div>
    {myReports.length===0&&<div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:20}}>No reports yet.</div>}
    {[...myReports].reverse().map(r=>(
      <Card key={r.id} style={{padding:'12px 14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
          <div>
            <span style={{fontWeight:700,fontSize:13,textTransform:'capitalize'}}>{r.type} Report</span>
            <span style={{fontSize:12,color:'var(--muted)',marginLeft:8}}>to {r.toName}</span>

        </div>

        <div style={{fontSize:13,lineHeight:1.5}}>{r.content}</div>
        {r.fine>0&&<div style={{marginTop:6,fontSize:12,color:'var(--red)',fontWeight:600}}>Fine: {fmt(r.fine)}</div>}

    ))}

}

// ── COMMISSION TAB ────────────────────────────────────────────────────────────
function CommissionTab({user,signups=[],reports=[],settings}){
  const st=settings||DEFAULT_SETTINGS;
  const mySignups=signups.filter(s=>s.ref===user.code&&s.paymentStatus==='paid');
  const rateMap={ambassador:st.commAmb||500,cc:st.commCC||100,pm:st.commPM||75,pfc:st.commPFC||50};
  const rate=rateMap[user.role]||0;
  const gross=mySignups.length*rate;
  const finesFromReports=reports.filter(r=>r.from===user.code&&r.fine>0).reduce((a,r)=>a+r.fine,0);
  const deductions=(user.deductions||[]).reduce((a,d)=>a+d.amount,0)+finesFromReports;
  const net=Math.max(0,gross-deductions);

  // Missed reports
  const myReports=reports.filter(r=>r.from===user.code);
  const dailyCount=myReports.filter(r=>r.type==='daily').length;
  const weeklyCount=myReports.filter(r=>r.type==='weekly').length;
  const monthlyCount=myReports.filter(r=>r.type==='monthly').length;

  const doExport=()=>{
    exportCSV([{Name:user.name,Code:user.code,Role:user.role,Signups:mySignups.length,Rate:rate,Gross:gross,Fines:deductions,Net:net}],'commission-'+user.code);
  };
  return<div style={{padding:16}}>
    <Card style={{background:'linear-gradient(135deg,var(--blue),var(--blue2))',color:'#fff'}}>
      <div style={{fontSize:13,opacity:.75,marginBottom:4}}>Net Commission</div>
      <div style={{fontWeight:900,fontSize:36}}>{fmt(net)}</div>
      <div style={{fontSize:13,opacity:.7,marginTop:4}}>Rate: {fmt(rate)}/signup · {mySignups.length} signup{mySignups.length!==1?'s':''}</div>
    </Card>
    <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:12}}>
      <StatCard label="Gross Earned" value={fmt(gross)} icon="💰" color="var(--green)"/>
      <StatCard label="Deductions" value={fmt(deductions)} icon="⚠️" color="var(--red)"/>
    </div>
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontWeight:700}}>Breakdown</div>
        <Btn onClick={doExport} small variant="ghost">⬇ Export</Btn>
      </div>
      {[['Paid Signups',mySignups.length],['Rate per Signup',fmt(rate)],['Gross Commission',fmt(gross)],['Report Fines',fmt(finesFromReports)],['Other Deductions',fmt((user.deductions||[]).reduce((a,d)=>a+d.amount,0))],['NET PAYABLE',fmt(net)]].map(([l,v],i)=>(
        <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--bg)',fontSize:14,fontWeight:i===5?800:400,color:i===5?'var(--green)':'inherit'}}>
          <span>{l}</span><span>{v}</span>
        </div>
      ))}
    </Card>
    <Card>
      <div style={{fontWeight:700,marginBottom:10}}>Report Activity</div>
      {[['Daily Reports',dailyCount],['Weekly Reports',weeklyCount],['Monthly Reports',monthlyCount]].map(([l,v])=>(
        <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--bg)',fontSize:14}}>
          <span>{l}</span><span style={{fontWeight:700}}>{v}</span>
        </div>
      ))}
    </Card>
    {mySignups.length>0&&(
      <Card>
        <div style={{fontWeight:700,marginBottom:10}}>My Paid Signups</div>
        {mySignups.map(s=>(
          <div key={s.id} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--bg)',fontSize:13}}>
            <span>{s.name}</span><span style={{color:'var(--green)',fontWeight:600}}>{fmt(rate)}</span>
          </div>
        ))}
      </Card>
    )}
  </div>;
}

    const m={id:genId(),roomId:'rehovtu-'+genId(),title:title.trim(),by:user.code,byName:user.name,at:new Date().toISOString()};
    await saveMeetings([...(meetings||[]),m]);setTitle('');
    window.open(`https://${JITSI}/${m.roomId}#userInfo.displayName="${encodeURIComponent(user.name)}"&config.prejoinPageEnabled=false`,'_blank','noopener');
  };
  return<div style={{padding:14}}>
    <Card>
      <div style={{fontWeight:700,marginBottom:10}}>🎥 Start a Meeting</div>
      <Inp label="Meeting Title" value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Weekly Sync"/>
      <Btn onClick={create} full variant="green">Start Meeting</Btn>
    </Card>
    <div style={{fontWeight:700,marginBottom:8,fontSize:14}}>Recent Meetings</div>
    {[...meetings].reverse().slice(0,10).map(m=>(
      <Card key={m.id} style={{padding:'12px 14px'}}>
        <div style={{fontWeight:600,fontSize:14,marginBottom:2}}>{m.title}</div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:8}}>{m.byName} · {fmtDate(m.at?.split('T')[0])}</div>
        <div style={{display:'flex',gap:8}}>
          <Btn onClick={()=>window.open(`https://${JITSI}/${m.roomId}#userInfo.displayName="${encodeURIComponent(user.name)}"&config.prejoinPageEnabled=false`,'_blank','noopener')} small variant="green">Join</Btn>
          <Btn onClick={()=>navigator.clipboard.writeText(`https://${JITSI}/${m.roomId}`)} small variant="ghost">Copy Link</Btn>
        </div>
      </Card>
    ))}
  </div>;
}

// ── ACCOUNT TAB ───────────────────────────────────────────────────────────────
function AccountTab({user,users,saveUsers}){
  const[form,setForm]=useState({name:user.name,phone:user.phone,email:user.email,curPw:'',newPw:''});
  const[ok,setOk]=useState('');const[err,setErr]=useState('');
  const s=v=>e=>setForm(f=>({...f,[v]:e.target.value}));
  const save=async()=>{
    if(user.id==='FOUNDER'){setOk('Founder profile is fixed');return;}
    if(form.newPw&&form.curPw!==user.password){setErr('Current password wrong');return;}
    const updated={...user,name:form.name,phone:form.phone,email:form.email,...(form.newPw?{password:form.newPw}:{})};
    await saveUsers({...users,[user.id]:updated});setOk('Saved!');setTimeout(()=>setOk(''),2500);
  };
  return<div style={{padding:14}}>
    {err&&<Alrt type="error" msg={err} onClose={()=>setErr('')}/>}
    {ok&&<Alrt type="success" msg={ok} onClose={()=>setOk('')}/>}
    <Card style={{textAlign:'center',marginBottom:12}}>
      <div style={{width:60,height:60,borderRadius:'50%',background:'var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:22,fontWeight:700,margin:'0 auto'}}>{user.name[0]}</div>
      <div style={{fontWeight:800,fontSize:17,marginTop:10}}>{user.name}</div>
      <div style={{fontSize:13,color:'var(--muted)'}}>{ROLE_LABELS[user.role]} · {user.code}</div>
    </Card>
    <Card>
      <Inp label="Full Name" value={form.name} onChange={s('name')}/>
      <Inp label="Phone" type="tel" value={form.phone} onChange={s('phone')}/>
      <Inp label="Email" type="email" value={form.email} onChange={s('email')}/>
      {user.id!=='FOUNDER'&&<>
        <PwInp label="Current Password (to change)" value={form.curPw} onChange={s('curPw')} id="cp1"/>
        <PwInp label="New Password" value={form.newPw} onChange={s('newPw')} id="cp2"/>
      </>}
      <Btn onClick={save} full>Save Changes</Btn>
    </Card>
  </div>;
}

// ── ADMIN TAB (Founder / HR) ──────────────────────────────────────────────────
function AdminTab({user,users,saveUsers,signups,reports,settings,saveSettings,logs=[]}){
  const[subTab,setSubTab]=useState('overview');
  const[fineUser,setFineUser]=useState('');const[fineAmt,setFineAmt]=useState('');const[fineReason,setFineReason]=useState('');
  const[settForm,setSettForm]=useState(settings||DEFAULT_SETTINGS);
  const[ok,setOk]=useState('');

  const all=Object.values(users||{}).filter(u=>u.approved&&!u.resigned&&u.id!=='FOUNDER');
  const{start}=useMemo(()=>{const n=new Date();return{start:new Date(n.getFullYear(),n.getMonth(),1).toISOString().split('T')[0]};});
  const thisMonthSignups=(signups||[]).filter(s=>s.date>=start);
  const paidSignups=(signups||[]).filter(s=>s.paymentStatus==='paid');

  const issueFine=async()=>{
    if(!fineUser||!fineAmt)return;
    const u=all.find(u=>u.id===fineUser);if(!u)return;
    const fine={id:genId(),amount:Number(fineAmt),reason:fineReason||'Admin fine',date:TODAY};
    await saveUsers({...users,[u.id]:{...u,deductions:[...(u.deductions||[]),fine]}});
    await sendEmail(u.email,u.name,'Fine Issued – RehoVTU',emailTpl('Fine Notice',`<p>A fine of <strong>${fmt(Number(fineAmt))}</strong> has been issued to your account. Reason: ${fineReason||'Admin fine'}</p>`));
    setFineUser('');setFineAmt('');setFineReason('');setOk('Fine issued');setTimeout(()=>setOk(''),2500);
  };

  const checkMissedReports=async()=>{
    // Check all members: did they submit a daily report today?
    const today=TODAY;
    const missing=all.filter(u=>{
      const submitted=reports.some(r=>r.from===u.code&&r.type==='daily'&&r.date===today);
      return!submitted;
    });
    setOk(`${missing.length} member(s) haven't submitted today's report: ${missing.map(u=>u.name).join(', ')||'None'}`);
  };

  const exportAll=()=>{
    const rows=logs.map(l=>({Date:l.date,Name:l.userName,Code:l.userCode,Role:l.role,Activities:l.activities,Notes:l.note||''}));
    exportCSV(rows,'all-activity-logs');
  };

  const adminTabs=[{id:'overview',label:'Overview'},{id:'members',label:'Members'},{id:'fines',label:'Fines'},{id:'reports',label:'Reports'},{id:'settings',label:'Settings'}];
  return<div style={{padding:14}}>
    {ok&&<Alrt type={ok.includes('Fine')&&!ok.includes('issued')?'warn':'success'} msg={ok} onClose={()=>setOk('')}/>}
    <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:14,paddingBottom:4,scrollbarWidth:'none'}}>
      {adminTabs.map(t=><button key={t.id} onClick={()=>setSubTab(t.id)} style={{whiteSpace:'nowrap',padding:'6px 14px',borderRadius:16,border:`1.5px solid ${subTab===t.id?'var(--blue)':'var(--border)'}`,background:subTab===t.id?'var(--blue)':'#fff',color:subTab===t.id?'#fff':'var(--muted)',fontWeight:subTab===t.id?700:500,fontSize:13,cursor:'pointer'}}>{t.label}</button>)}
    </div>

    {subTab==='overview'&&<>
      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:12}}>
        <StatCard label="Total Members" value={all.length} icon="👥" color="var(--blue)"/>
        <StatCard label="This Month Signups" value={thisMonthSignups.length} icon="📝" color="var(--gold)"/>
        <StatCard label="Total Paid Signups" value={paidSignups.length} icon="✅" color="var(--green)"/>
        <StatCard label="Reports Today" value={(reports||[]).filter(r=>r.date===TODAY).length} icon="📋" color="var(--blue)"/>
      </div>
      <Btn onClick={checkMissedReports} full variant="gold">🔍 Check Missed Reports Today</Btn>
      {['founder','pfc'].includes(user.role)&&<div style={{marginTop:10}}><Btn onClick={exportAll} full variant="ghost">⬇ Export All Activity Logs</Btn></div>}
    </>}

    {subTab==='members'&&<>
      {all.map(u=>(
        <Card key={u.id} style={{padding:'12px 14px'}}>
          <div style={{fontWeight:700,fontSize:14}}>{u.name}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>{ROLE_LABELS[u.role]} · {u.code} · {u.phone}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>{u.email}</div>
          {(u.deductions||[]).length>0&&<div style={{fontSize:12,color:'var(--red)',marginTop:4}}>Fines: {fmt((u.deductions||[]).reduce((a,d)=>a+d.amount,0))}</div>}
        </Card>
      ))}
    </>}

    {subTab==='fines'&&<>
      <Card>
        <div style={{fontWeight:700,marginBottom:12}}>Issue Fine</div>
        <select value={fineUser} onChange={e=>setFineUser(e.target.value)} style={{width:'100%',padding:'10px 12px',border:'1.5px solid var(--border)',borderRadius:10,fontSize:14,marginBottom:12,background:'#fff'}}>
          <option value="">Select member...</option>
          {all.map(u=><option key={u.id} value={u.id}>{u.name} ({u.code})</option>)}
        </select>
        <Inp label="Amount (₦)" type="number" value={fineAmt} onChange={e=>setFineAmt(e.target.value)}/>
        <Inp label="Reason" value={fineReason} onChange={e=>setFineReason(e.target.value)} placeholder="e.g. Missed weekly report"/>
        <Btn onClick={issueFine} full variant="red">Issue Fine</Btn>
      </Card>
      <div style={{fontWeight:700,marginBottom:8,fontSize:14}}>All Fines</div>
      {all.filter(u=>(u.deductions||[]).length>0).map(u=>(
        <Card key={u.id}>
          <div style={{fontWeight:700,marginBottom:8}}>{u.name}</div>
          {(u.deductions||[]).map(d=>(
            <div key={d.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--bg)',fontSize:13}}>
              <span>{d.reason} · {fmtDate(d.date)}</span><span style={{fontWeight:700,color:'var(--red)'}}>{fmt(d.amount)}</span>
            </div>
          ))}
        </Card>
      ))}
    </>}

    {subTab==='reports'&&<TeamReportsTab user={user} users={users} reports={reports} saveReports={async()=>{}} logs={logs}/>}

    {subTab==='settings'&&user.role==='founder'&&<>
      <Card>
        <div style={{fontWeight:700,marginBottom:14}}>Bank Details</div>
        {['bankName','accountNumber','accountName'].map(k=>(
          <Inp key={k} label={k.replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase())} value={settForm[k]||''} onChange={e=>setSettForm(f=>({...f,[k]:e.target.value}))}/>
        ))}
      </Card>
      <Card>
        <div style={{fontWeight:700,marginBottom:14}}>Commission (₦ per signup)</div>
        {[['commAmb','Ambassador'],['commCC','Campus Coordinator'],['commPM','Project Manager'],['commPFC','PFC']].map(([k,l])=>(
          <Inp key={k} label={l} type="number" value={settForm[k]||''} onChange={e=>setSettForm(f=>({...f,[k]:Number(e.target.value)}))}/>
        ))}
      </Card>
      <Card>
        <div style={{fontWeight:700,marginBottom:14}}>Payment</div>
        <Inp label="Paystack Key" value={settForm.paystackKey||''} onChange={e=>setSettForm(f=>({...f,paystackKey:e.target.value}))} placeholder="pk_live_..."/>
        <Inp label="Site Price (₦)" type="number" value={settForm.sitePrice||2000} onChange={e=>setSettForm(f=>({...f,sitePrice:Number(e.target.value)}))}/>
      </Card>
      <Btn onClick={async()=>{await saveSettings(settForm);setOk('Settings saved!');}} full variant="green">Save Settings</Btn>
    </>}
  </div>;
}

// ── HOME TAB ──────────────────────────────────────────────────────────────────
function HomeTab({user,signups=[],reports=[],logs=[],settings,broadcasts=[]}){
  const st=settings||DEFAULT_SETTINGS;
  const mySignups=signups.filter(s=>s.ref===user.code&&s.paymentStatus==='paid');
  const rateMap={ambassador:st.commAmb||500,cc:st.commCC||100,pm:st.commPM||75,pfc:st.commPFC||50};
  const rate=rateMap[user.role]||0;
  const gross=mySignups.length*rate;
  const fineDeductions=reports.filter(r=>r.from===user.code&&r.fine>0).reduce((a,r)=>a+r.fine,0);
  const otherDeductions=(user.deductions||[]).reduce((a,d)=>a+d.amount,0);
  const net=Math.max(0,gross-fineDeductions-otherDeductions);
  const todayLog=logs.find(l=>l.userId===user.id&&l.date===TODAY);
  const myReports=reports.filter(r=>r.from===user.code);
  const latestBroadcast=broadcasts[broadcasts.length-1];
  return<div style={{padding:14}}>
    <div style={{background:'linear-gradient(135deg,var(--blue),var(--blue2))',borderRadius:14,padding:18,marginBottom:12,color:'#fff'}}>
      <div style={{fontSize:13,opacity:.7}}>Welcome back 👋</div>
      <div style={{fontWeight:800,fontSize:19,marginTop:4}}>{user.name}</div>
      <div style={{fontSize:12,opacity:.65,marginTop:2}}>{ROLE_LABELS[user.role]} · {user.code}</div>
    </div>
    <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:12}}>
      <StatCard label="Net Commission" value={fmt(net)} icon="💰" color="var(--green)"/>
      <StatCard label="My Signups" value={mySignups.length} icon="👥" color="var(--blue)"/>
      <StatCard label="Reports Sent" value={myReports.length} icon="📋" color="var(--gold)"/>
    </div>
    <Card style={{borderLeft:`4px solid ${todayLog?'var(--green)':'var(--gold)'}`}}>
      <div style={{fontWeight:700,marginBottom:4}}>📅 Today's Log</div>
      {todayLog?<div style={{fontSize:13,color:'var(--green)'}}>✅ Logged — {todayLog.activities.slice(0,80)}...</div>
        :<div style={{fontSize:13,color:'var(--gold)'}}>⚠️ You haven't logged today's activities yet.</div>}
    </Card>
    {latestBroadcast&&<Card style={{borderLeft:'4px solid var(--blue)',marginTop:0}}>
      <div style={{fontWeight:700,marginBottom:4}}>📢 Latest Update</div>
      <div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{latestBroadcast.title}</div>
      <div style={{fontSize:12,color:'var(--muted)'}}>{latestBroadcast.body?.slice(0,100)}{latestBroadcast.body?.length>100?'...':''}</div>
    </Card>}
  </div>;
}

// ── BROADCASTS (Founder) ──────────────────────────────────────────────────────
function BroadcastsTab({user,users,broadcasts=[],saveBroadcasts}){
  const[form,setForm]=useState({title:'',body:''});const[ok,setOk]=useState('');
  const send=async()=>{
    if(!form.title||!form.body)return;
    const b={id:genId(),title:form.title,body:form.body,from:user.code,date:TODAY};
    await saveBroadcasts([...(broadcasts||[]),b]);
    const all=Object.values(users||{}).filter(u=>u.approved&&!u.resigned&&u.email);
    for(const u of all.slice(0,50)){
      await sendEmail(u.email,u.name,form.title,emailTpl(form.title,`<p>${form.body.replace(/\n/g,'<br/>')}</p>`));
    }
    setForm({title:'',body:''});setOk('Broadcast sent!');setTimeout(()=>setOk(''),3000);
  };
  return<div style={{padding:14}}>
    {ok&&<Alrt type="success" msg={ok}/>}
    <Card>
      <div style={{fontWeight:700,marginBottom:12}}>📢 New Broadcast</div>
      <Inp label="Title" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}/>
      <Inp label="Message" value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))} rows={4}/>
      <Btn onClick={send} full variant="gold">Send to All Team</Btn>
    </Card>
    {[...broadcasts].reverse().map(b=>(
      <Card key={b.id} style={{padding:'12px 14px',borderLeft:'4px solid var(--gold)'}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{b.title}</div>
        <div style={{fontSize:13,lineHeight:1.5,marginBottom:6}}>{b.body}</div>
        <div style={{fontSize:11,color:'var(--muted)'}}>{fmtDate(b.date)}</div>
      </Card>
    ))}
  </div>;
}

// ── DASHBOARDS ────────────────────────────────────────────────────────────────

  const{users,saveUsers,signups,settings,saveSettings,broadcasts,saveBroadcasts,reports,saveReports,meetings,saveMeetings,grp,saveGrp,dms,saveDms,logs,saveLogs}=appState;
  const[tab,setTab]=useState('home');

  const isAdmin=['founder','hr'].includes(user.role);
  const isUpline=['founder','pfc','pm','cc','hr'].includes(user.role);

  const tabs=[
    {id:'home',label:'Home',icon:'🏠'},
    {id:'log',label:'Activity Log',icon:'📅'},
    {id:'report',label:'Report',icon:'📋'},
    ...isUpline?[{id:'teamreports',label:'Team Reports',icon:'📊'}]:[],
    {id:'commission',label:'Earnings',icon:'💰'},
    {id:'meeting',label:'Meeting',icon:'🎥'},
    {id:'grp',label:'Group',icon:'💬'},
    {id:'dm',label:'DMs',icon:'✉️'},
    ...isAdmin?[{id:'broadcasts',label:'Broadcasts',icon:'📢'}]:[],
    ...isAdmin?[{id:'admin',label:'Admin',icon:'⚙️'}]:[],

  return<div style={{minHeight:'100vh',background:'var(--bg)'}}>

      {tab==='report'&&<ReportsTab user={user} users={users} reports={reports} saveReports={saveReports}/>}
      {tab==='teamreports'&&<TeamReportsTab user={user} users={users} reports={reports} saveReports={saveReports} logs={logs}/>}
      {tab==='commission'&&<CommissionTab user={user} signups={signups} reports={reports} settings={settings}/>}
      {tab==='meeting'&&<MeetingTab user={user} meetings={meetings} saveMeetings={saveMeetings}/>}
      {tab==='grp'&&<GrpTab user={user} grp={grp} saveGrp={saveGrp}/>}
      {tab==='dm'&&<DMTab user={user} users={users} dms={dms} saveDms={saveDms}/>}
      {tab==='broadcasts'&&<BroadcastsTab user={user} users={users} broadcasts={broadcasts} saveBroadcasts={saveBroadcasts}/>}
      {tab==='admin'&&<AdminTab user={user} users={users} saveUsers={saveUsers} signups={signups} reports={reports} settings={settings} saveSettings={saveSettings} logs={logs}/>}
      {tab==='account'&&<AccountTab user={user} users={users} saveUsers={saveUsers}/>}
    </div>
  </div>;
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState('loading');
  const[currentUser,setCurrentUser]=useState(null);
  const[state,setState]=useState({users:{},signups:[],settings:DEFAULT_SETTINGS,broadcasts:[],reports:[],meetings:[],grp:[],dms:[],logs:[],inviteTokens:{}});

  useEffect(()=>{
    (async()=>{
      const keys=['users','signups','settings','broadcasts','reports','meetings','grp','dms','logs'];
      const results=await Promise.all(keys.map(k=>dbGet(k)));
      const loaded={};keys.forEach((k,i)=>{if(results[i]!==null)loaded[k]=results[i];});
      setState(prev=>({...prev,...loaded}));
      const sess=lsGet('session');
      if(sess){
        if(sess.id==='FOUNDER'){setCurrentUser(FOUNDER);setScreen('dashboard');}
        else{
          const u=(loaded.users||{})[sess.id];
          if(u&&!u.resigned){setCurrentUser(u);setScreen('dashboard');}
          else setScreen('landing');
        }
      }else setScreen('landing');
    })();
    if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{});
  },[]);

  const mk=key=>async val=>{setState(prev=>({...prev,[key]:val}));await dbSet(key,val);};

  const appState={
    ...state,
    saveUsers:mk('users'),saveSignups:mk('signups'),saveSettings:mk('settings'),
    saveBroadcasts:mk('broadcasts'),saveReports:mk('reports'),saveMeetings:mk('meetings'),
    saveGrp:mk('grp'),saveDms:mk('dms'),saveLogs:mk('logs'),
  };

  const login=user=>{setCurrentUser(user);lsSet('session',{id:user.id});setScreen('dashboard');};
  const logout=()=>{setCurrentUser(null);localStorage.removeItem('rho_session');setScreen('landing');};

  if(screen==='loading')return<LoadingScreen/>;
  if(screen==='landing')return<Landing onNavigate={setScreen}/>;
  if(screen==='register')return<Register onBack={()=>setScreen('landing')} users={state.users} saveUsers={appState.saveUsers}/>;
  if(screen==='login')return<Login users={state.users} onLogin={login} onNavigate={setScreen}/>;
  if(screen==='forgot')return<ForgotPw users={state.users} saveUsers={appState.saveUsers} onBack={()=>setScreen('login')}/>;
  if(screen==='dashboard'&&currentUser)return<Dashboard user={currentUser} appState={appState} onLogout={logout}/>;
  return<Landing onNavigate={setScreen}/>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
