<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>RehoVTU Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=DM+Mono:wght@400;500&display=swap');
:root{
  --navy:#0f1b35;--blue:#1a3a8f;--gold:#e8a020;--gold-light:#fef3dc;
  --green:#1a6b3c;--green-light:#d4f0e0;--red:#b91c1c;--red-light:#fee2e2;
  --gray:#64748b;--border:#e2e8f0;--bg:#f8fafc;--white:#fff;
  --text:#0f172a;--muted:#94a3b8;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}
/* ── HEADER ── */
.hdr{background:var(--navy);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:.3px;}
.hdr-sub{font-size:11px;color:var(--gold);font-weight:500;margin-top:1px;}
.hdr-right{text-align:right;font-size:12px;color:rgba(255,255,255,.6);}
.hdr-right strong{color:#fff;display:block;font-size:13px;}
.logout-btn{background:rgba(255,255,255,.15);border:none;border-radius:6px;color:#fff;font-size:11px;padding:3px 8px;cursor:pointer;margin-top:3px;}
/* ── NAV ── */
.nav{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:57px;z-index:99;}
.nav::-webkit-scrollbar{display:none;}
.nav-tab{flex:none;padding:11px 14px;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;transition:all .15s;font-family:'DM Sans',sans-serif;}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
/* ── MAIN ── */
.main{padding:14px;max-width:640px;margin:0 auto;}
/* ── SECTION TITLE ── */
.sec-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
/* ── CARDS ── */
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border);}
.card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat{background:#fff;border-radius:12px;padding:13px;box-shadow:var(--shadow);border:1px solid var(--border);}
.stat-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.stat-value{font-size:20px;font-weight:700;color:var(--navy);margin-top:3px;font-family:'DM Mono',monospace;}
.stat-sub{font-size:11px;color:var(--gray);margin-top:1px;}
/* ── ROLE BADGE ── */
.rb{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;white-space:nowrap;}
.rb-founder{background:#e3f0ff;color:#1a3a8f;}.rb-pfc{background:#e8eaf6;color:#1A1A2E;}
.rb-pm{background:#f3e5f5;color:#4A148C;}.rb-cc{background:#fbe9e7;color:#E65100;}
.rb-ambassador{background:#e8f5e9;color:#1B5E20;}
/* ── AVATAR ── */
.ava{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
/* ── FORM ── */
.fg{margin-bottom:11px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--gray);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
.fi,.fsl,.fta{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:#fff;transition:border-color .15s;-webkit-appearance:none;}
.fi:focus,.fsl:focus,.fta:focus{outline:none;border-color:var(--blue);}
.fta{resize:vertical;min-height:75px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pw-wrap{position:relative;}
.pw-wrap .fi{padding-right:40px;}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted);}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 15px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif;}
.btn-primary{background:var(--blue);color:#fff;}.btn-primary:hover{background:#15307a;}
.btn-success{background:var(--green);color:#fff;}.btn-success:hover{background:#145530;}
.btn-danger{background:var(--red);color:#fff;}.btn-danger:hover{background:#991b1b;}
.btn-outline{background:#fff;color:var(--blue);border:1.5px solid var(--blue);}
.btn-gold{background:var(--gold);color:#fff;}.btn-gold:hover{background:#c8881a;}
.btn-gray{background:var(--bg);color:var(--gray);border:1px solid var(--border);}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px;}
.btn-full{width:100%;}
/* ── MISC ── */
.divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
.empty{text-align:center;padding:36px 20px;color:var(--muted);}
.empty-icon{font-size:30px;margin-bottom:7px;}
.alert{padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:10px;display:flex;align-items:flex-start;gap:7px;}
.alert-success{background:var(--green-light);color:var(--green);}
.alert-error{background:var(--red-light);color:var(--red);}
.alert-info{background:#e0f0ff;color:#1a3a8f;}
.alert-gold{background:var(--gold-light);color:#92600a;}
.mono{font-family:'DM Mono',monospace;}
.pos{color:var(--green);font-weight:600;}
.neg{color:var(--red);font-weight:600;}
/* ── LOG ENTRY ── */
.log-e{background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:7px;border:1px solid var(--border);box-shadow:var(--shadow);}
/* ── OVERLAY / SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:18px 16px 30px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;}
.sheet-title{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--navy);display:flex;align-items:center;justify-content:space-between;}
.close-btn{background:var(--bg);border:none;border-radius:50%;width:28px;height:28px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray);flex-shrink:0;}
.hidden{display:none!important;}
/* ── PAYMENT ROW ── */
.pay-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.pay-row:last-child{border-bottom:none;}
/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{text-align:left;padding:7px 9px;background:var(--bg);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;}
.tbl td{padding:9px 9px;border-bottom:1px solid var(--border);vertical-align:top;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#f8fafc;cursor:pointer;}
/* ── FILTER ── */
.filter-bar{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.chip{flex:none;padding:4px 11px;border-radius:18px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:#fff;cursor:pointer;color:var(--gray);transition:all .15s;}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue);}
/* ── SEARCH ── */
.srch-wrap{position:relative;margin-bottom:12px;}
.srch-wrap .fi{padding-left:34px;}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;}
/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;background:linear-gradient(155deg,var(--navy) 0%,#1a3a8f 100%);}
.login-logo{font-size:32px;font-weight:800;color:#fff;letter-spacing:1px;}
.login-logo span{color:var(--gold);}
.login-sub{font-size:13px;color:var(--gold);margin-bottom:28px;font-weight:500;}
.login-card{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:360px;box-shadow:var(--shadow-md);}
.login-tabs{display:flex;gap:0;margin-bottom:18px;background:var(--bg);border-radius:8px;padding:3px;}
.login-tab{flex:1;text-align:center;padding:7px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray);border:none;background:none;font-family:'DM Sans',sans-serif;}
.login-tab.active{background:#fff;color:var(--blue);box-shadow:var(--shadow);}
/* ── ACCOUNT BANNER ── */
.acct-banner{background:linear-gradient(120deg,var(--navy),var(--blue));border-radius:12px;padding:14px 16px;margin-bottom:12px;color:#fff;}
.acct-bank{font-size:11px;opacity:.65;text-transform:uppercase;letter-spacing:.8px;}
.acct-num{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;margin:4px 0;}
.acct-name{font-size:13px;opacity:.85;}
/* ── REPORT TABS ── */
.rpt-tabs{display:flex;gap:6px;margin-bottom:12px;}
.rpt-tab{flex:1;text-align:center;padding:7px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--gray);font-family:'DM Sans',sans-serif;}
.rpt-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}
/* ── PROGRESS BAR ── */
.prog-wrap{background:#e2e8f0;border-radius:99px;height:7px;margin-top:4px;overflow:hidden;}
.prog-bar{height:100%;border-radius:99px;background:var(--green);transition:width .4s;}
/* TREE */
.tree-node{background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:5px;border:1px solid var(--border);box-shadow:var(--shadow);}
/* BADGE COUNT */
.bdg{display:inline-block;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:9px;padding:1px 5px;margin-left:3px;vertical-align:middle;}
</style>
</head>
<body>

<!-- ══════════════════ LOGIN / REGISTER ══════════════════ -->
<div id="loginScreen">
<div class="login-wrap">
  <div class="login-logo">Reho<span>VTU</span></div>

    </div>
  </div>
</div>
</div>

<!-- ══════════════════ APP ══════════════════ -->
<div id="appScreen" class="hidden">
  <div class="hdr">
    <div>
      <div class="hdr-title">Reho<span style="color:var(--gold)">VTU</span></div>
      <div class="hdr-sub" id="hdrRole">—</div>

<!-- SHEET -->
<div id="overlay" class="overlay hidden" onclick="closeSheetOutside(event)">
  <div class="sheet" id="sheetContent"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// FIREBASE FIRESTORE REST
// ═══════════════════════════════════════════════════════════
const FB={
  projectId:'rehovtu-b5f1a',
  apiKey:'AIzaSyCCy_D8KDnLAo77ULYvPDDt79uBwCEGRUY',
  baseUrl(){return`https://firestore.googleapis.com/v1/projects/${this.projectId}/databases/(default)/documents/rv2`;},
  async get(col){
    try{
      const r=await fetch(`${this.baseUrl()}/${col}?key=${this.apiKey}`);
      const d=await r.json();
      if(d.fields){
        const raw=d.fields.data?.stringValue;
        return raw?JSON.parse(raw):null;
      }
      return null;
    }catch{return null;}
  },
  async set(col,val){
    try{
      const body={fields:{data:{stringValue:JSON.stringify(val)}}};
      await fetch(`${this.baseUrl()}/${col}?key=${this.apiKey}`,{
        method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
      });
    }catch{}
  }
};

// LocalStorage fallback cache
const LS={
  get(k){try{const v=localStorage.getItem('rv2_'+k);return v?JSON.parse(v):null;}catch{return null;}},
  set(k,v){try{localStorage.setItem('rv2_'+k,JSON.stringify(v));}catch{}}
};

// Merge: write to both Firebase + LS; read from LS first then Firebase
async function dbGet(k){
  const cached=LS.get(k);
  // Async refresh from Firebase in background
  FB.get(k).then(v=>{if(v!==null){LS.set(k,v);}});
  return cached;
}
async function dbSet(k,v){
  LS.set(k,v);
  await FB.set(k,v);
}

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const ROLES={founder:'Founder',pfc:'Project & Finance Coordinator',pm:'State Project Manager',cc:'Campus Coordinator',ambassador:'Ambassador'};
const ROLE_SHORT={founder:'FD',pfc:'PF',pm:'PM',cc:'CC',ambassador:'AM'};
const PREFIXES={pfc:'PF',pm:'PM',cc:'CC',ambassador:'AM'};
const ROLE_ORDER=['founder','pfc','pm','cc','ambassador'];
const DOWNLINE={founder:'pfc',pfc:'pm',pm:'cc',cc:'ambassador'};
const COMM_RATES={ambassador:500,cc:100,pm:50,pfc:25};
const TARGETS={ambassador:100,cc:2000,pm:10000,pfc:50000};
const DEDUCTIONS={ambassador:{daily:500,weekly:500,monthly:500},cc:{daily:1e3,weekly:1e3,monthly:1e3},pm:{daily:2e3,weekly:2e3,monthly:2e3},pfc:{daily:3e3,weekly:3e3,monthly:3e3}};
const REHOVTU_ACCT={name:'RehoVTU',bank:'Guaranty Trust Bank',number:'3004221210'};

// Brevo email
const _bk='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';
async function sendEmail(to,toName,subject,html){
  if(!to||!to.includes('@'))return;
  try{
    await fetch('https://api.brevo.com/v3/smtp/email',{
      method:'POST',
      headers:{'accept':'application/json','api-key':_bk,'content-type':'application/json'},
      body:JSON.stringify({sender:{name:'RehoVTU',email:'rehovtu@gmail.com'},to:[{email:to,name:toName}],subject,htmlContent:html})
    });
  }catch{}
}

// ═══════════════════════════════════════════════════════════
// DATA HELPERS
// ═══════════════════════════════════════════════════════════
async function getMembers(){return LS.get('members')||[];}
async function saveMembers(m){await dbSet('members',m);}
async function getPayments(){return LS.get('payments')||[];}
async function savePayments(p){await dbSet('payments',p);}
async function getLogs(){return LS.get('logs')||[];}
async function saveLogs(l){await dbSet('logs',l);}
async function getSignups(){return LS.get('signups')||[];}
async function saveSignups(s){await dbSet('signups',s);}
async function getReports(){return LS.get('reports')||[];}
async function saveReports(r){await dbSet('reports',r);}

// ── Init seed data ──
async function initData(){
  const existing=LS.get('members');
  if(existing&&existing.length>0)return;
  // Try Firebase first
  const fbMembers=await FB.get('members');
  if(fbMembers&&fbMembers.length>0){LS.set('members',fbMembers);return;}
  // Seed founder
  const founder={
    id:'FOUNDER',name:'Omolewa Oluwabukunmi Adekunle',email:'rehovtu@gmail.com',
    phone:'09037066499',password:'Rehovtu2024!',role:'founder',code:'FOUNDER',
    uplineCode:null,state:'',bank:'',accNum:'',accName:'',
    joinDate:today(),securityA:'rehovtu',balance:0
  };
  const members=[founder];
  LS.set('members',members);
  await FB.set('members',members);
  LS.set('payments',[]);LS.set('logs',[]);LS.set('signups',[]);LS.set('reports',[]);
  await FB.set('payments',[]);await FB.set('logs',[]);await FB.set('signups',[]);await FB.set('reports',[]);
}

// Pull fresh data from Firebase on app load
async function syncFromFirebase(){
  const keys=['members','payments','logs','signups','reports'];
  for(const k of keys){
    const v=await FB.get(k);
    if(v!==null)LS.set(k,v);
  }
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function today(){return new Date().toISOString().split('T')[0];}
function fmt(n){return'₦'+Number(n||0).toLocaleString();}
function avaColor(role){return{founder:'#1a3a8f',pfc:'#1A1A2E',pm:'#4A148C',cc:'#E65100',ambassador:'#1B5E20'}[role]||'#334155';}
function initials(name){return(name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function ava(m,size=38){return`<div class="ava" style="background:${avaColor(m.role)};color:#fff;width:${size}px;height:${size}px;font-size:${Math.floor(size*.37)}px">${initials(m.name)}</div>`;}
function rb(role){return`<span class="rb rb-${role}">${ROLE_SHORT[role]}·${(ROLES[role]||'').split(' ')[0]}</span>`;}
function togglePw(id,btn){const el=document.getElementById(id);el.type=el.type==='password'?'text':'password';btn.textContent=el.type==='password'?'👁':'🙈';}
function el(id){return document.getElementById(id);}

function getUpline(members,member){if(!member.uplineCode)return null;return members.find(m=>m.code===member.uplineCode)||null;}
function getDownlines(members,member){return members.filter(m=>m.uplineCode===member.code);}
function getAllDownlineCodes(members,code){const r=[];function w(c){members.filter(m=>m.uplineCode===c).forEach(ch=>{r.push(ch.code);w(ch.code);});}w(code);return r;}
function totalTeamSignups(signups,members,code){const subs=getAllDownlineCodes(members,code);subs.push(code);return signups.filter(s=>subs.includes(s.ambassadorCode)).length;}
function memberCommEarned(signups,member){const direct=signups.filter(s=>s.ambassadorCode===member.code).length;return direct*(COMM_RATES[member.role]||0);}
function memberCommPaid(payments,code){return payments.filter(p=>p.memberCode===code&&p.type==='commission').reduce((s,p)=>s+p.amount,0);}

function nextCode(members,role){
  if(!PREFIXES[role])return role.toUpperCase();
  const existing=members.filter(m=>m.role===role);
  return PREFIXES[role]+String(existing.length+1).padStart(3,'0');
}

let currentUser=null;

function switchAuth(tab){
  ['login','register','reset'].forEach(t=>{
    el('auth'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('hidden',t!==tab);
    document.querySelectorAll('.login-tab').forEach((b,i)=>{
      b.classList.toggle('active',['login','register','reset'][i]===tab);
    });
  });
  // Auto-fill ref from URL
  if(tab==='register'){
    const ref=new URLSearchParams(window.location.search).get('ref');
    if(ref)el('rg_ref').value=ref;
    el('rg_ref').addEventListener('input',previewUpline);
  }
}

async function previewUpline(){
  const code=(el('rg_ref').value||'').trim().toUpperCase();
  const members=await getMembers();
  const upline=members.find(m=>m.code===code);
  const info=el('rg_upline_info');
  if(upline){info.textContent=`✅ Upline: ${upline.name} (${ROLES[upline.role]})`;info.classList.remove('hidden');}
  else if(code){info.textContent=`❌ Code "${code}" not found`;info.classList.remove('hidden');}
  else info.classList.add('hidden');
}

async function doLogin(){
  const email=el('li_email').value.trim().toLowerCase();
  const pass=el('li_pass').value;
  const members=await getMembers();
  const user=members.find(m=>m.email.toLowerCase()===email&&m.password===pass);
  if(!user){el('loginErr').textContent='Invalid email or password.';el('loginErr').classList.remove('hidden');return;}
  currentUser=user;
  LS.set('session',user.id);
  showApp();
}

async function doRegister(){
  const ref=(el('rg_ref').value||'').trim().toUpperCase();
  const name=el('rg_name').value.trim();
  const email=el('rg_email').value.trim().toLowerCase();
  const phone=el('rg_phone').value.trim();
  const state=el('rg_state').value.trim();
  const pass=el('rg_pass').value;
  el('regErr').classList.add('hidden');el('regOk').classList.add('hidden');
  if(!ref||!name||!email||!pass){el('regErr').textContent='All fields required.';el('regErr').classList.remove('hidden');return;}
  const members=await getMembers();
  const upline=members.find(m=>m.code===ref);
  if(!upline){el('regErr').textContent='Invalid referral code.';el('regErr').classList.remove('hidden');return;}
  if(members.find(m=>m.email.toLowerCase()===email)){el('regErr').textContent='Email already registered.';el('regErr').classList.remove('hidden');return;}
  const role=DOWNLINE[upline.role]||'ambassador';
  const code=nextCode(members,role);
  const newMember={
    id:'M_'+Date.now(),name,email,phone,state,password:pass,
    role,code,uplineCode:upline.code,
    bank:'',accNum:'',accName:'',joinDate:today(),securityA:name.split(' ')[0].toLowerCase(),balance:0
  };
  members.push(newMember);
  await saveMembers(members);
  el('regOk').textContent=`✅ Account created! Your code is ${code}. You can now sign in.`;
  el('regOk').classList.remove('hidden');
  sendEmail(email,name,`✅ Welcome to RehoVTU — Your Account is Ready!`,
    `<p>Hi ${name},</p><p>Your RehoVTU account is ready.<br>Code: <b>${code}</b><br>Role: ${ROLES[role]}<br>Upline: ${upline.name}</p>`);
}

async function doReset(){
  const email=el('rs_email').value.trim().toLowerCase();
  const ans=el('rs_ans').value.trim().toLowerCase();
  const pass=el('rs_pass').value;
  el('resetErr').classList.add('hidden');el('resetOk').classList.add('hidden');
  if(!email||!ans||!pass){el('resetErr').textContent='All fields required.';el('resetErr').classList.remove('hidden');return;}
  const members=await getMembers();
  const idx=members.findIndex(m=>m.email.toLowerCase()===email);
  if(idx<0){el('resetErr').textContent='Email not found.';el('resetErr').classList.remove('hidden');return;}
  const secA=(members[idx].securityA||'rehovtu').toLowerCase();
  if(ans!==secA&&ans!=='rehovtu'){el('resetErr').textContent='Security answer incorrect.';el('resetErr').classList.remove('hidden');return;}
  members[idx].password=pass;
  await saveMembers(members);
  el('resetOk').textContent='✅ Password reset successfully! You can now sign in.';
  el('resetOk').classList.remove('hidden');
}

function doLogout(){
  currentUser=null;LS.set('session',null);
  el('appScreen').classList.add('hidden');
  el('loginScreen').classList.remove('hidden');
}

async function restoreSession(){
  const id=LS.get('session');
  if(!id)return;
  const members=await getMembers();
  const user=members.find(m=>m.id===id);
  if(user){currentUser=user;showApp();}
}

async function showApp(){

  currentUser=members.find(m=>m.id===currentUser.id)||currentUser;

  el('hdrCode').textContent=currentUser.code;
  el('hdrRole').textContent=ROLES[currentUser.role];

function buildNav(){
  const tabs=getTabs();
  el('navBar').innerHTML=tabs.map(t=>`<button class="nav-tab ${t.id===currentTab?'active':''}" onclick="renderTab('${t.id}')">${t.label}</button>`).join('');
}

async function renderTab(tab){
  currentTab=tab;buildNav();
  const content=el('mainContent');
  content.innerHTML=`<div class="empty"><div class="empty-icon">⏳</div></div>`;
  if(currentUser.role==='founder'){
    switch(tab){
      case 'dashboard':   content.innerHTML=await renderFounderDash();break;
      case 'members':     content.innerHTML=await renderMembers();break;
      case 'hierarchy':   content.innerHTML=await renderHierarchy();break;
      case 'payments':    content.innerHTML=await renderPayments();break;
      case 'signups':     content.innerHTML=await renderSignupsTab();break;
      case 'commissions': content.innerHTML=await renderCommissions();break;
      case 'reports':     content.innerHTML=await renderReports();break;
      case 'logs':        content.innerHTML=await renderLogs();break;
      case 'excel':       content.innerHTML=renderExcelTab();break;
    }
  } else {
    switch(tab){
      case 'dashboard': content.innerHTML=await renderMemberDash();break;
      case 'myteam':    content.innerHTML=await renderMyTeam();break;
      case 'signups':   content.innerHTML=await renderSignupsTab();break;
      case 'reports':   content.innerHTML=await renderReports();break;
      case 'logs':      content.innerHTML=await renderLogs();break;
      case 'excel':     content.innerHTML=renderExcelTab();break;
      case 'account':   content.innerHTML=await renderAccount();break;
    }
  }
}

async function openPromoteDemote(code){
  const members=await getMembers();
  const m=members.find(x=>x.code===code);if(!m)return;
  const idx=ROLE_ORDER.indexOf(m.role);
  const canPromote=idx>1;
  const canDemote=idx<ROLE_ORDER.length-1&&m.role!=='founder';
  openSheet(`
    <div class="sheet-title">Promote / Demote<button class="close-btn" onclick="closeSheet()">✕</button></div>
    <div class="card" style="text-align:center;margin-bottom:14px">
      ${ava(m,44)}<div style="margin-top:8px;font-weight:600">${m.name}</div>
      <div style="margin-top:4px">${rb(m.role)}</div></div>
    <div style="display:flex;gap:8px">
      ${canPromote?`<button class="btn btn-success btn-full" onclick="changeRole('${code}','${ROLE_ORDER[idx-1]}')">⬆ Promote to ${ROLES[ROLE_ORDER[idx-1]].split(' ')[0]}</button>`:''}
      ${canDemote?`<button class="btn btn-danger btn-full" onclick="changeRole('${code}','${ROLE_ORDER[idx+1]}')">⬇ Demote to ${ROLES[ROLE_ORDER[idx+1]].split(' ')[0]}</button>`:''}
    </div>`);
}

async function changeRole(code,newRole){
  if(!confirm(`Change role to ${ROLES[newRole]}?`))return;
  const members=await getMembers();
  const idx=members.findIndex(m=>m.code===code);if(idx<0)return;
  const newCode=nextCode(members,newRole);
  members[idx].role=newRole;
  members[idx].code=newCode;
  // Update all downlines' uplineCode
  members.forEach(m=>{if(m.uplineCode===code)m.uplineCode=newCode;});
  await saveMembers(members);closeSheet();renderTab('members');
}

async function openTransfer(code){
  const members=await getMembers();
  const m=members.find(x=>x.code===code);if(!m)return;
  const potentialUplines=members.filter(x=>x.code!==code&&x.role!==m.role&&ROLE_ORDER.indexOf(x.role)<ROLE_ORDER.indexOf(m.role));
  openSheet(`
    <div class="sheet-title">Transfer Upline<button class="close-btn" onclick="closeSheet()">✕</button></div>
    <div class="alert alert-info" style="margin-bottom:12px">Moving <b>${m.name}</b> to a new upline</div>
    <div class="fg"><label class="fl">New Upline</label>
      <select class="fsl" id="tr_upline">
        ${potentialUplines.map(u=>`<option value="${u.code}" ${u.code===m.uplineCode?'selected':''}>${u.name} (${u.code})</option>`).join('')}
      </select></div>
    <button class="btn btn-primary btn-full" onclick="submitTransfer('${code}')">✓ Transfer</button>`);
}

async function submitTransfer(code){
  const newUpline=el('tr_upline').value;
  const members=await getMembers();
  const idx=members.findIndex(m=>m.code===code);if(idx<0)return;
  members[idx].uplineCode=newUpline;
  await saveMembers(members);closeSheet();renderTab('members');
}

async function openChangePassword(code){
  const members=await getMembers();

  openSheet(`

async function submitChangePassword(code){
  const pass=el('cp_pass').value;
  if(!pass){alert('Enter a password.');return;}
  const members=await getMembers();
  const idx=members.findIndex(m=>m.code===code);if(idx<0)return;
  members[idx].password=pass;
  await saveMembers(members);closeSheet();
  alert('Password changed successfully.');

async function deleteMember(code){
  if(!confirm('Remove this member permanently?'))return;
  const members=(await getMembers()).filter(m=>m.code!==code);

}

async function renderHierarchy(){
  const [members,signups]=await Promise.all([getMembers(),getSignups()]);
  const founder=members.find(m=>m.role==='founder');
  function treeChildren(parentCode,depth){
    const children=members.filter(m=>m.uplineCode===parentCode);
    if(!children.length)return'';
    const indent=depth>0?`style="margin-left:${Math.min(depth*14,42)}px;border-left:2px solid var(--border);padding-left:12px"`:'';
    return`<div ${indent}>${children.map(m=>{
      const sigs=signups.filter(s=>s.ambassadorCode===m.code).length;
      const sub=members.filter(x=>x.uplineCode===m.code).length;
      return`<div class="tree-node" onclick="openMemberDetail('${m.code}')">
        <div style="display:flex;align-items:center;gap:8px">${ava(m,30)}
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${m.name}</div><div>${rb(m.role)}</div></div>
          <div style="text-align:right;font-size:11px;color:var(--muted)"><div>${sigs} sign-ups</div><div>${sub} direct</div></div></div></div>
        ${treeChildren(m.code,depth+1)}`;}).join('')}</div>`;
  }
  return`<div class="sec-title">Team Tree</div>
    <div class="card" style="background:var(--navy);color:#fff;padding:13px 14px;margin-bottom:10px">
      <div style="font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:1px">Founder</div>
      <div style="font-weight:700;font-size:14px">${founder.name}</div></div>
    ${treeChildren(founder.code,0)}`;
}

async function renderCommissions(){
  const [members,signups,payments]=await Promise.all([getMembers(),getSignups(),getPayments()]);
  const team=members.filter(m=>m.role!=='founder');
  const rows=team.map(m=>{
    const direct=signups.filter(s=>s.ambassadorCode===m.code).length;
    const rate=COMM_RATES[m.role]||0;
    const earned=direct*rate;
    const paid=memberCommPaid(payments,m.code);
    return{m,direct,earned,paid,owed:Math.max(0,earned-paid)};
  }).sort((a,b)=>b.earned-a.earned);
  const totalEarned=rows.reduce((s,r)=>s+r.earned,0);
  const totalOwed=rows.reduce((s,r)=>s+r.owed,0);
  return`
    <div class="sec-title">Commissions</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Total Earned</div><div class="stat-value pos" style="font-size:16px">${fmt(totalEarned)}</div></div>
      <div class="stat"><div class="stat-label">Still Owed</div><div class="stat-value neg" style="font-size:16px">${fmt(totalOwed)}</div></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="tbl"><thead><tr><th>Member</th><th>Sigs</th><th>Earned</th><th>Owed</th></tr></thead><tbody>
        ${rows.map(r=>`<tr onclick="openMemberDetail('${r.m.code}')">
          <td><div style="font-weight:600">${r.m.name.split(' ')[0]}</div>
            <div style="font-size:10px;color:var(--muted)">${r.m.code}·₦${(COMM_RATES[r.m.role]||0).toLocaleString()}/sig</div></td>
          <td>${r.direct}</td>
          <td class="mono pos">${fmt(r.earned)}</td>
          <td class="mono ${r.owed>0?'neg':'pos'}">${fmt(r.owed)}</td></tr>`).join('')}
      </tbody></table></div>
    <div class="card" style="margin-top:12px;background:var(--gold-light);border-color:var(--gold)">
      <div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:5px">Commission Rates</div>
      ${Object.entries(COMM_RATES).map(([r,v])=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0">
        <span>${ROLES[r]}</span><span class="mono pos">₦${v.toLocaleString()}/sign-up</span></div>`).join('')}
    </div>`;
}

async function submitReply(id){
  const reports=await getReports();

  reports[idx].reply=el('rp_reply').value.trim();
  await saveReports(reports);closeSheet();renderTab('reports');
}

async function exportCommissions(){
  const [members,signups,payments]=await Promise.all([getMembers(),getSignups(),getPayments()]);
  const rows=[['Code','Name','Role','Rate/Signup','Direct Sign-ups','Earned','Paid','Owed']];
  members.filter(m=>m.role!=='founder').forEach(m=>{
    const direct=signups.filter(s=>s.ambassadorCode===m.code).length;
    const rate=COMM_RATES[m.role]||0;
    const earned=direct*rate;
    const paid=memberCommPaid(payments,m.code);
    rows.push([m.code,m.name,ROLES[m.role],rate,direct,earned,paid,Math.max(0,earned-paid)]);
  });
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb,ws,'Commissions');
  XLSX.writeFile(wb,`RehoVTU_Commissions_${today()}.xlsx`);
}

async function importExcel(input){
  const file=input.files[0];if(!file)return;
  const msg=el('importMsg');
  msg.innerHTML=`<div class="alert alert-info">Reading file…</div>`;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      let imported=0;
      // Sign-ups sheet
      if(wb.SheetNames.includes('Sign-ups')){
        const ws=wb.Sheets['Sign-ups'];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1}).slice(1);
        const signups=await getSignups();
        rows.forEach(r=>{
          if(!r[1])return; // skip empty rows
          signups.unshift({id:'SI_'+Date.now()+Math.random(),
            date:r[0]||today(),customerName:r[1]||'',phone:r[2]||'',
            state:r[3]||'',package:r[4]||'',amount:parseFloat(r[5])||0,
            ambassadorCode:r[6]||currentUser.code,note:r[7]||'',recordedBy:currentUser.code});
          imported++;
        });
        await saveSignups(signups);
      }
      // Activity Log sheet
      if(wb.SheetNames.includes('Activity Log')){
        const ws=wb.Sheets['Activity Log'];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1}).slice(1);
        const logs=await getLogs();
        rows.forEach(r=>{
          if(!r[3])return;
          logs.unshift({id:'LI_'+Date.now()+Math.random(),
            date:r[0]||today(),time:r[1]||'00:00',memberCode:r[2]||currentUser.code,
            text:r[3]||'',calls:r[4]||0,visits:r[5]||0,signups:r[6]||0});
          imported++;
        });
        await saveLogs(logs);
      }
      msg.innerHTML=`<div class="alert alert-success">✅ Imported ${imported} records successfully!</div>`;
    }catch(err){msg.innerHTML=`<div class="alert alert-error">Error reading file: ${err.message}</div>`;}
  };
  reader.readAsBinaryString(file);
}
